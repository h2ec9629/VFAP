<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>梱包箱使用数</title>
<style>
  /* スクロールバー */
  :root { --accent:#d97757; --accent-hi:#e89070; }
  ::-webkit-scrollbar              { width:17px; height:17px; }
  ::-webkit-scrollbar-track        { background:#1C1C1C; }
  ::-webkit-scrollbar-thumb        { background:var(--accent); border-radius:6px; border:2px solid #1C1C1C; }
  ::-webkit-scrollbar-thumb:hover  { background:var(--accent-hi); }
  ::-webkit-scrollbar-corner       { background:#1C1C1C; }
  html,body{scrollbar-width:auto;scrollbar-color:var(--accent) #1C1C1C;}

*{box-sizing:border-box;margin:0;padding:0;}
body{background:#1a1a1a;color:#e0e0e0;font-family:'Segoe UI','Yu Gothic UI',sans-serif;font-size:14px;}
header{background:#161616;color:#fff;padding:6px 14px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #2a2a2a;position:sticky;top:0;z-index:20;}
header h1{font-size:17px;font-weight:700;}
header .sub{font-size:12px;opacity:.5;}
.badge{background:#e86a00;color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;}
.filter-bar{padding:6px 14px;background:#1e1e1e;border-bottom:1px solid #2a2a2a;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.filter-bar label{font-size:12px;color:#aaa;}
.filter-bar select,.filter-bar input[type=text]{background:#2a2a2a;color:#e0e0e0;border:1px solid #3a3a3a;border-radius:4px;padding:3px 8px;font-size:12px;}
.filter-bar select:focus{outline:none;border-color:#e86a00;}
.main-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
thead th{position:sticky;top:0;background:#161616;color:#e0e0e0;font-size:12px;font-weight:600;padding:6px 10px;border-bottom:2px solid #333;border-right:1px solid #2a2a2a;white-space:nowrap;cursor:pointer;user-select:none;}
thead th:hover{background:#222;}
thead th .sort-icon{opacity:.4;margin-left:4px;font-size:10px;}
thead th.sorted .sort-icon{opacity:1;color:#e86a00;}
tbody tr{border-bottom:1px solid #252525;}
tbody tr:hover{background:#222;}
tbody td{padding:6px 10px;border-right:1px solid #232323;font-size:13px;white-space:nowrap;}
td.nm{max-width:260px;overflow:hidden;text-overflow:ellipsis;font-size:12px;color:#ccc;}
td.qty{text-align:right;color:#7bb8f5;}
td.af{color:#a0c8a0;font-size:12px;}
td.hako{color:#f5c97b;font-size:14px;}
td.shosu{text-align:right;font-weight:700;color:#e86a00;font-size:16px;}
td.cnt{text-align:right;color:#7bb8f5;}
.done-row{opacity:.4;}
.summary-wrap{padding:14px;}
.total-line{display:flex;align-items:baseline;gap:6px;background:#1e1e1e;border:1px solid #333;border-radius:6px;padding:10px 16px;width:fit-content;}
.total-lbl{font-size:13px;color:#aaa;margin-right:6px;}
.total-val{font-size:22px;font-weight:700;color:#e86a00;}
.total-val2{font-size:22px;font-weight:700;color:#7bb8f5;}
.total-unit{font-size:11px;color:#666;}
.total-sep{color:#444;margin:0 8px;}
.nohako-note{font-size:12px;color:#888;margin-top:8px;}
.empty{padding:40px;text-align:center;color:#555;}
</style>
</head>
<body>
<header>
  <h1>梱包箱 使用数</h1>
  <span class="sub" id="hd-sub"></span>
  <span class="badge" id="hd-badge" style="display:none"></span>
</header>
<div class="filter-bar">
  <label>引取日</label>
  <select id="fil-af"><option value="">すべて</option></select>
  <label style="margin-left:10px;">梱包箱</label>
  <select id="fil-hako"><option value="">すべて</option></select>
  <label style="margin-left:10px;display:flex;align-items:center;gap:4px;">
    <input type="checkbox" id="fil-undone" checked> 未完了のみ
  </label>
  <label style="margin-left:10px;display:flex;align-items:center;gap:4px;">
    <input type="checkbox" id="fil-future" checked> 本日以降のみ
  </label>
</div>
<div class="main-wrap">
  <table id="main-table">
    <thead><tr>
      <th data-col="hako">梱包箱 <span class="sort-icon">▲</span></th>
      <th data-col="shosu" class="sorted">合計使用数 <span class="sort-icon">▲</span></th>
      <th data-col="cnt">対象タスク数 <span class="sort-icon">▲</span></th>
    </tr></thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="empty" id="empty-msg" style="display:none">該当するタスクがありません</div>
</div>
<div class="summary-wrap">
  <div class="total-line">
    <span class="total-lbl">総合計</span>
    <span class="total-val" id="total-shosu">0</span><span class="total-unit">枚</span>
    <span class="total-sep">/</span>
    <span class="total-val2" id="total-cnt">0</span><span class="total-unit">タスク</span>
  </div>
  <div class="nohako-note" id="nohako-note"></div>
</div>
<script>
// ── app.py がここを書き換えてデータを注入する ──
const HAKO_ROWS = [];
// ─────────────────────────────────────────────
let sortCol='shosu', sortAsc=false;

function normDate(s){
  if(!s) return '';
  const m=s.match(/^(\d{2})\/(\d{2})$/);
  return m ? '2026/'+m[1]+'/'+m[2] : s;
}

function buildFilters(){
  const afSel=document.getElementById('fil-af');
  const hakoSel=document.getElementById('fil-hako');
  [...new Set(HAKO_ROWS.map(r=>r.af||'').filter(Boolean))].sort()
    .forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;afSel.appendChild(o);});
  [...new Set(HAKO_ROWS.map(r=>r.hako||'').filter(Boolean))].sort()
    .forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;hakoSel.appendChild(o);});
}

// 引取日(MM/DD or 2026/MM/DD)を Date に。判定不可なら null
function afDate(s){
  const d=normDate(s);
  if(!d) return null;
  const t=new Date(d.replace(/-/g,'/'));
  return isNaN(t) ? null : t;
}

function getFiltered(){
  const afV=document.getElementById('fil-af').value;
  const hakoV=document.getElementById('fil-hako').value;
  const undone=document.getElementById('fil-undone').checked;
  const future=document.getElementById('fil-future').checked;
  const today=new Date(); today.setHours(0,0,0,0);
  return HAKO_ROWS.filter(r=>{
    if(afV && r.af!==afV) return false;
    if(hakoV && r.hako!==hakoV) return false;
    if(undone && r.done) return false;
    if(future){
      const d=afDate(r.af);           // 引取日不明のタスクは残す
      if(d && d < today) return false; // 引取日が過去のものだけ除外
    }
    return true;
  });
}

// タスク明細 → 梱包箱ごとに合計使用数・対象タスク数を集計
function aggregate(rows){
  const map={};
  let noHako=0;
  rows.forEach(r=>{
    if(!r.hako){noHako++;return;}
    if(!map[r.hako]) map[r.hako]={hako:r.hako,shosu:0,cnt:0};
    map[r.hako].shosu+=(r.shosu||0);
    map[r.hako].cnt+=1;
  });
  return {aggRows:Object.values(map),noHako};
}

function sortRows(rows){
  return [...rows].sort((a,b)=>{
    let av=a[sortCol]??'', bv=b[sortCol]??'';
    if(sortCol==='shosu'||sortCol==='cnt'){av=+av||0;bv=+bv||0;}
    if(av<bv) return sortAsc?-1:1;
    if(av>bv) return sortAsc?1:-1;
    return 0;
  });
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function render(){
  const filtered=getFiltered();
  const {aggRows,noHako}=aggregate(filtered);
  const rows=sortRows(aggRows);
  const tbody=document.getElementById('tbody');
  if(!rows.length){
    tbody.innerHTML='';
    document.getElementById('empty-msg').style.display='';
  } else {
    document.getElementById('empty-msg').style.display='none';
    tbody.innerHTML=rows.map(r=>{
      return `<tr><td class="hako">${esc(r.hako)}</td><td class="shosu">${r.shosu}</td><td class="cnt">${r.cnt}</td></tr>`;
    }).join('');
  }
  // 合計行
  const totalShosu=rows.reduce((s,r)=>s+r.shosu,0);
  const totalCnt=rows.reduce((s,r)=>s+r.cnt,0);
  document.getElementById('total-shosu').textContent=totalShosu;
  document.getElementById('total-cnt').textContent=totalCnt;
  const nh=document.getElementById('nohako-note');
  nh.textContent=noHako>0?`※ 箱未設定のタスク ${noHako} 件は集計外`:'';

  const badge=document.getElementById('hd-badge');
  document.getElementById('hd-sub').textContent=`${rows.length} 種`;
  if(filtered.length!==HAKO_ROWS.length){badge.textContent=`全${HAKO_ROWS.length}件中`;badge.style.display='';}
  else badge.style.display='none';
}

function updateSortIcons(){
  document.querySelectorAll('thead th[data-col]').forEach(th=>{
    const c=th.dataset.col;
    th.classList.toggle('sorted',c===sortCol);
    th.querySelector('.sort-icon').textContent=(c===sortCol)?(sortAsc?'▲':'▼'):'▲';
  });
}

document.querySelectorAll('thead th[data-col]').forEach(th=>{
  th.addEventListener('click',()=>{
    const c=th.dataset.col;
    if(sortCol===c) sortAsc=!sortAsc;
    else{sortCol=c;sortAsc=true;}
    updateSortIcons();render();
  });
});
document.getElementById('fil-af').addEventListener('change',render);
document.getElementById('fil-hako').addEventListener('change',render);
document.getElementById('fil-undone').addEventListener('change',render);
document.getElementById('fil-future').addEventListener('change',render);

buildFilters();updateSortIcons();render();
</script>
</body>
</html>
