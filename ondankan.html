// 品名 -> {kind, temps:{温度: [下限,C,上限]}}
const ONDAN_MAP = {};
ONDAN_DATA.forEach(g => { ONDAN_MAP[g.base] = g; });

const nameSel = document.getElementById('ondan-name');
const tempInput = document.getElementById('ondan-temp');
const resultBox = document.getElementById('ondan-result');

function lookupOndan(name, temp) {
  const g = ONDAN_MAP[name];
  if (!g) return null;
  // 温度はキーが数値 or '無' などの文字列のことがある
  let key = temp;
  if (g.temps.hasOwnProperty(temp)) key = temp;
  else if (g.temps.hasOwnProperty(Number(temp))) key = Number(temp);
  else if (g.temps.hasOwnProperty(String(Number(temp)))) key = String(Number(temp));
  else return undefined;
  return g.temps[key];
}

function render() {
  const name = nameSel.value;
  const temp = tempInput.value.trim();
  resultBox.innerHTML = '';

  if (!name) { return; }
  if (temp === '') {
    const availTemps = Object.keys(ONDAN_MAP[name].temps);
    resultBox.innerHTML = `<div class="ondan-temps">この品名の登録温度: ${availTemps.join('、')}</div>`;
    return;
  }

  const found = lookupOndan(name, temp);
  if (found === null || found === undefined) {
    resultBox.innerHTML = '<div class="ondan-msg warn">⚠ 該当する組み合わせが見つかりませんでした。品名・温度を確認してな。</div>';
    return;
  }
  const [lo, c, hi] = found;
  resultBox.innerHTML = `
    <table>
      <tr><th>下限</th><th>換算 (C)</th><th>上限</th></tr>
      <tr><td>${lo}</td><td class="highlight">${c}</td><td>${hi}</td></tr>
    </table>
  `;
}

nameSel.addEventListener('change', render);
