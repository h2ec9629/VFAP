<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>温度換算表 — VFAP</title>
<style>
:root {
  --bg:#1c1c1c; --panel:#222; --line:#333; --ink:#e8e8e8; --sub:#888;
  --head:#161616; --accent:#d97757; --accent-hi:#e89070;
  --row-alt:#252525; --hit:#2a3a2a; --changed:#2a2a3a;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;height:100%;font-family:"游ゴシック","Yu Gothic","Meiryo",sans-serif;
  background:var(--bg);color:var(--ink);overflow:hidden;}

::-webkit-scrollbar{width:14px;height:14px;}
::-webkit-scrollbar-track{background:#1c1c1c;}
::-webkit-scrollbar-thumb{background:var(--accent);border-radius:6px;border:2px solid #1c1c1c;}
::-webkit-scrollbar-thumb:hover{background:var(--accent-hi);}
::-webkit-scrollbar-corner{background:#1c1c1c;}
html,body,*{scrollbar-width:thin;scrollbar-color:var(--accent) #1c1c1c;}

/* Layout */
.od-wrap{display:flex;flex-direction:column;height:100vh;overflow:hidden;}

/* Header */
.od-head{
  background:var(--head);padding:8px 16px;border-bottom:2px solid #2a2a2a;
  display:flex;align-items:center;gap:12px;flex-shrink:0;
}
.od-head-title{font-size:18px;font-weight:700;color:var(--ink);}
.od-head-badge{font-size:13px;color:var(--sub);background:#222;
  padding:3px 10px;border-radius:4px;border:1px solid var(--line);white-space:nowrap;}
.od-head-spacer{flex:1;}
.od-head-btn{
  background:#2a2a2a;border:1px solid #3a3a3a;color:var(--accent);
  font-size:13px;font-weight:600;cursor:pointer;padding:5px 14px;border-radius:5px;
  white-space:nowrap;font-family:inherit;transition:background 0.15s,color 0.15s;
}
.od-head-btn:hover{background:var(--accent);color:#1c1c1c;border-color:var(--accent);}
.od-head-btn.danger{color:#e06060;border-color:#3a2a2a;}
.od-head-btn.danger:hover{background:#e06060;color:#1c1c1c;border-color:#e06060;}

/* Body split */
.od-body{display:flex;flex:1;min-height:0;overflow:hidden;}

/* Sidebar */
.od-sidebar{
  width:260px;min-width:200px;flex-shrink:0;
  background:var(--panel);border-right:1px solid var(--line);
  display:flex;flex-direction:column;overflow:hidden;
}
.od-sidebar-search{
  padding:8px;border-bottom:1px solid var(--line);flex-shrink:0;
}
.od-sidebar-search input{
  width:100%;background:#1a1a1a;border:1px solid #3a3a3a;border-radius:5px;
  color:var(--ink);font-size:13px;padding:6px 10px;outline:none;font-family:inherit;
}
.od-sidebar-search input:focus{border-color:var(--accent);}
.od-sidebar-list{overflow-y:auto;flex:1;padding:4px 0;}
.od-group-label{
  font-size:11px;font-weight:700;color:var(--sub);padding:8px 10px 3px;
  letter-spacing:0.05em;text-transform:uppercase;
}
.od-item{
  padding:6px 14px;font-size:13px;cursor:pointer;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  border-left:3px solid transparent;transition:background 0.1s;
  color:#ccc;
}
.od-item:hover{background:#2a2a2a;color:var(--ink);}
.od-item.active{
  background:#2a2a2a;color:var(--accent);
  border-left-color:var(--accent);font-weight:600;
}
.od-item.has-edit{color:#9db4d9;}
.od-item.active.has-edit{color:var(--accent);}

/* Main content */
.od-main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;}
.od-main-head{
  background:var(--head);padding:8px 16px;border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:10px;flex-shrink:0;
}
.od-main-nm{font-size:15px;font-weight:700;color:var(--ink);flex:1;}
.od-main-count{font-size:12px;color:var(--sub);}
.od-save-btn{
  background:#1a2a1a;border:1px solid #2a4a2a;color:#6db86d;
  font-size:12px;font-weight:600;cursor:pointer;padding:4px 12px;border-radius:4px;
  font-family:inherit;transition:background 0.15s;display:none;
}
.od-save-btn.visible{display:inline-block;}
.od-save-btn:hover{background:#2a4a2a;color:#8de08d;}
.od-table-wrap{flex:1;overflow:auto;}

/* Empty state */
.od-empty{
  display:flex;align-items:center;justify-content:center;
  height:100%;font-size:15px;color:var(--sub);
}

/* Table */
.od-tbl{border-collapse:collapse;width:100%;font-size:14px;}
.od-tbl thead th{
  position:sticky;top:0;z-index:2;
  background:#1a1a1a;color:var(--sub);font-weight:600;font-size:12px;
  padding:7px 10px;border-bottom:2px solid #444;text-align:center;
  white-space:nowrap;
}
.od-tbl thead th:first-child{text-align:left;}
.od-tbl tbody tr:nth-child(even){background:var(--row-alt);}
.od-tbl tbody tr:hover{background:#2c2c2c;}
.od-tbl td{
  padding:4px 6px;border-bottom:1px solid #2a2a2a;
  color:var(--ink);text-align:center;vertical-align:middle;
}
.od-tbl td:first-child{
  text-align:left;color:var(--sub);font-size:12px;padding-left:12px;
  user-select:none;white-space:nowrap;
}
/* Editable cells */
.od-cell{
  background:transparent;border:1px solid transparent;border-radius:4px;
  color:var(--ink);font-size:14px;width:100%;text-align:center;
  padding:4px 6px;outline:none;font-family:inherit;
  transition:border-color 0.1s,background 0.1s;
}
.od-cell:focus{
  border-color:var(--accent);background:#262626;
}
.od-cell.changed{
  border-color:#4a4a7a !important;background:#1e1e2e !important;color:#a0a8e8 !important;
}
/* Center column highlight */
.od-cell-c{color:#d9c07b;font-weight:600;}
.od-cell-c.changed{color:#a0a8e8 !important;}

/* Footer */
.od-footer{
  background:var(--head);padding:6px 16px;border-top:1px solid var(--line);
  display:flex;align-items:center;gap:10px;flex-shrink:0;font-size:12px;color:var(--sub);
}
.od-changed-count{color:#a0a8e8;font-weight:600;display:none;}
.od-changed-count.visible{display:inline;}
</style>
</head>
<body>
<div class="od-wrap">
  <!-- Header -->
  <div class="od-head">
    <span class="od-head-title">🌡 温度換算表</span>
    <span class="od-head-badge" id="od-version">読み込み中...</span>
    <div class="od-head-spacer"></div>
    <button class="od-head-btn" onclick="exportChanges()" id="od-export-btn" style="display:none">📤 変更をエクスポート</button>
    <button class="od-head-btn danger" onclick="resetAll()" id="od-reset-btn" style="display:none">↩ 全変更を元に戻す</button>
    <button class="od-head-btn" onclick="window.close()">✕ 閉じる</button>
  </div>

  <div class="od-body">
    <!-- Sidebar -->
    <div class="od-sidebar">
      <div class="od-sidebar-search">
        <input type="text" id="od-search" placeholder="🔍 品名で絞り込み..." oninput="filterSidebar(this.value)">
      </div>
      <div class="od-sidebar-list" id="od-sidebar-list"></div>
    </div>

    <!-- Main -->
    <div class="od-main">
      <div class="od-main-head">
        <span class="od-main-nm" id="od-main-nm">← 品名を選んでください</span>
        <span class="od-main-count" id="od-main-count"></span>
        <button class="od-save-btn" id="od-save-btn" onclick="saveCurrentEdits()">💾 保存</button>
      </div>
      <div class="od-table-wrap" id="od-table-wrap">
        <div class="od-empty">品名を選択すると換算表が表示されます</div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="od-footer">
    <span>編集した値は <b>localStorage</b> に保存されます。ブラウザを閉じても保持されます。</span>
    <span class="od-changed-count" id="od-changed-count"></span>
  </div>
</div>

// localStorage キー
const LS_KEY = 'vfap_ondan_edits';

// 編集データ: {全キー: [lo, c, hi]}
let edits = {};

function loadEdits() {
  try {
    const s = localStorage.getItem(LS_KEY);
    edits = s ? JSON.parse(s) : {};
  } catch(e) { edits = {}; }
}

function saveEdits() {
  localStorage.setItem(LS_KEY, JSON.stringify(edits));
  updateChangedCount();
}

function updateChangedCount() {
  const n = Object.keys(edits).length;
  const el = document.getElementById('od-changed-count');
  el.textContent = n > 0 ? `${n} 件の変更あり` : '';
  el.classList.toggle('visible', n > 0);
  document.getElementById('od-export-btn').style.display = n > 0 ? '' : 'none';
  document.getElementById('od-reset-btn').style.display  = n > 0 ? '' : 'none';
  // サイドバーのhas-editフラグを更新
  refreshSidebarEditFlags();
}

function getVal(key) {
  return edits[key] ?? ONDAN_FLAT[key];
}

// ══════════════════════════════════════════════
// サイドバー構築
// ══════════════════════════════════════════════
let currentProduct = null;

function buildSidebar(filter='') {
  const list = document.getElementById('od-sidebar-list');
  list.innerHTML = '';
  const fl = filter.trim().toLowerCase();
  GROUPS.forEach(g => {
    const items = g.items.filter(nm => !fl || nm.toLowerCase().includes(fl));
    if (!items.length) return;
    const lbl = document.createElement('div');
    lbl.className = 'od-group-label';
    lbl.textContent = g.label;
    list.appendChild(lbl);
    items.forEach(nm => {
      const div = document.createElement('div');
      div.className = 'od-item' + (nm === currentProduct ? ' active' : '');
      div.textContent = nm;
      div.title = nm;
      div.dataset.nm = nm;
      // has-edit チェック
      const hasEdit = Object.keys(edits).some(k => k.startsWith(nm));
      if (hasEdit) div.classList.add('has-edit');
      div.onclick = () => selectProduct(nm);
      list.appendChild(div);
    });
  });
}

function filterSidebar(v) { buildSidebar(v); }

function refreshSidebarEditFlags() {
  document.querySelectorAll('.od-item').forEach(div => {
    const nm = div.dataset.nm;
    const hasEdit = nm && Object.keys(edits).some(k => k.startsWith(nm));
    div.classList.toggle('has-edit', hasEdit);
  });
}

// ══════════════════════════════════════════════
// 品名選択 → テーブル描画
// ══════════════════════════════════════════════
function selectProduct(nm) {
  currentProduct = nm;
  // サイドバーのアクティブ更新
  document.querySelectorAll('.od-item').forEach(d => {
    d.classList.toggle('active', d.dataset.nm === nm);
  });
  // ヘッダー更新
  document.getElementById('od-main-nm').textContent = nm;
  // 品名に一致するキーを取得
  const keys = Object.keys(ONDAN_FLAT).filter(k => k.startsWith(nm)).sort();
  document.getElementById('od-main-count').textContent = keys.length + ' 件';
  renderTable(nm, keys);
}

function renderTable(nm, keys) {
  const wrap = document.getElementById('od-table-wrap');
  if (!keys.length) {
    wrap.innerHTML = '<div class="od-empty">換算データがありません</div>';
    return;
  }
  // 温度サフィックスを抽出する関数
  const getSuffix = key => key.slice(nm.length).trim() || '—';

  let html = `<table class="od-tbl">
    <thead><tr>
      <th>温度</th>
      <th>下限</th>
      <th style="color:#d9c07b">換算(C)</th>
      <th>上限</th>
    </tr></thead>
    <tbody>`;

  keys.forEach((key, ri) => {
    const [lo, c, hi] = getVal(key);
    const changed = !!edits[key];
    const loC = 'od-cell' + (changed ? ' changed' : '');
    const cC  = 'od-cell od-cell-c' + (changed ? ' changed' : '');
    const hiC = 'od-cell' + (changed ? ' changed' : '');
    html += `<tr>
      <td>${getSuffix(key)}</td>
      <td><input class="${loC}" data-key="${key}" data-col="0" value="${lo}" oninput="onCellChange(this)" onblur="onCellBlur(this)"></td>
      <td><input class="${cC}"  data-key="${key}" data-col="1" value="${c}"  oninput="onCellChange(this)" onblur="onCellBlur(this)"></td>
      <td><input class="${hiC}" data-key="${key}" data-col="2" value="${hi}" oninput="onCellChange(this)" onblur="onCellBlur(this)"></td>
    </tr>`;
  });
  html += '</tbody></table>';
  wrap.innerHTML = html;
  updateSaveBtnVisibility();
}

// ══════════════════════════════════════════════
// セル編集
// ══════════════════════════════════════════════
// 入力中: クラスだけ更新
function onCellChange(inp) {
  const key = inp.dataset.key;
  const orig = ONDAN_FLAT[key];
  // 現在の行の全inputを取得
  const row = inp.closest('tr');
  const [i0, i1, i2] = row.querySelectorAll('input');
  const v0 = parseFloat(i0.value), v1 = parseFloat(i1.value), v2 = parseFloat(i2.value);
  const changed = (v0 !== orig[0] || v1 !== orig[1] || v2 !== orig[2]);
  [i0,i1,i2].forEach(i => i.classList.toggle('changed', changed));
  if (i1) i1.classList.toggle('od-cell-c', true); // always keep center style
  updateSaveBtnVisibility();
}

// フォーカスが外れたとき: editsに保存
function onCellBlur(inp) {
  const key = inp.dataset.key;
  const orig = ONDAN_FLAT[key];
  const row = inp.closest('tr');
  const [i0, i1, i2] = row.querySelectorAll('input');
  const v0 = parseFloat(i0.value), v1 = parseFloat(i1.value), v2 = parseFloat(i2.value);
  if (isNaN(v0) || isNaN(v1) || isNaN(v2)) return; // 不正値は無視
  const changed = (v0 !== orig[0] || v1 !== orig[1] || v2 !== orig[2]);
  if (changed) {
    edits[key] = [v0, v1, v2];
  } else {
    delete edits[key];
  }
  saveEdits();
  updateSaveBtnVisibility();
}

function updateSaveBtnVisibility() {
  const btn = document.getElementById('od-save-btn');
  // 現在テーブルにchangedクラスがあればsave btn表示
  const hasChanged = !!document.querySelector('.od-cell.changed');
  btn.classList.toggle('visible', hasChanged);
}

function saveCurrentEdits() {
  // 現在のテーブル全行を確定保存
  document.querySelectorAll('.od-tbl input[data-key]').forEach(inp => {
    if (inp.dataset.col !== '0') return; // 下限セルだけ基点にする
    const key = inp.dataset.key;
    const row = inp.closest('tr');
    const [i0,i1,i2] = row.querySelectorAll('input');
    const v0 = parseFloat(i0.value), v1 = parseFloat(i1.value), v2 = parseFloat(i2.value);
    const orig = ONDAN_FLAT[key];
    if (!isNaN(v0) && !isNaN(v1) && !isNaN(v2)) {
      if (v0 !== orig[0] || v1 !== orig[1] || v2 !== orig[2]) {
        edits[key] = [v0, v1, v2];
      } else {
        delete edits[key];
      }
    }
  });
  saveEdits();
  // テーブルを再描画して視覚をリセット
  if (currentProduct) selectProduct(currentProduct);
}

// ══════════════════════════════════════════════
// エクスポート / リセット
// ══════════════════════════════════════════════
function exportChanges() {
  const n = Object.keys(edits).length;
  if (!n) return alert('変更はありません。');
  // ONDAN_FLATに変更を適用したコピーを出力
  const merged = Object.assign({}, ONDAN_FLAT);
  Object.assign(merged, edits);
  const out = 'const ONDAN_FLAT = ' + JSON.stringify(merged) + ';';
  const blob = new Blob([out], {type:'text/javascript;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'ONDAN_FLAT_updated.js';
  a.click();
  URL.revokeObjectURL(a.href);
}

function resetAll() {
  if (!confirm(`${Object.keys(edits).length} 件の変更を全て元に戻しますか？`)) return;
  edits = {};
  saveEdits();
  buildSidebar(document.getElementById('od-search').value);
  if (currentProduct) selectProduct(currentProduct);
}

// ══════════════════════════════════════════════
// 初期化
// ══════════════════════════════════════════════
function init() {
  loadEdits();
  const n = Object.keys(ONDAN_FLAT).length;
  document.getElementById('od-version').textContent = `合計 ${n} 件`;
  buildSidebar();
  updateChangedCount();
  // 最初の品名を自動選択
  const firstGroup = GROUPS[0];
  if (firstGroup && firstGroup.items.length) selectProduct(firstGroup.items[0]);
}

document.addEventListener('DOMContentLoaded', init);
</script>
