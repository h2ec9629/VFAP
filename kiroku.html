<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>加工記録入力</title>
<style>
  :root{
    --bg:#1c1c1c; --panel:#222; --line:#333; --ink:#e8e8e8; --sub:#888;
    --head:#161616; --headtxt:#fff; --proc1:#7ba7d9; --deliv:#2e9e5b; --due:#d23b3b;
    --accent:#d97757; --accent-hi:#e89070;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;font-family:"游ゴシック","Yu Gothic",sans-serif;background:var(--bg);color:var(--ink);overflow:hidden;}

  /* スクロールバー */
  ::-webkit-scrollbar              { width:17px; height:17px; }
  ::-webkit-scrollbar-track        { background:#1C1C1C; }
  ::-webkit-scrollbar-thumb        { background:var(--accent); border-radius:6px; border:2px solid #1C1C1C; }
  ::-webkit-scrollbar-thumb:hover  { background:var(--accent-hi); }
  ::-webkit-scrollbar-corner       { background:#1C1C1C; }
  html,body,.kr-scroll,.kr-center{scrollbar-width:auto;scrollbar-color:var(--accent) #1C1C1C;}

  /* ページ全体をkiroku-pad2で埋める */
  .kiroku-pad2{
    background:#1c1c1c;width:100%;height:100vh;display:flex;flex-direction:column;overflow:hidden;
  }

  /* ヘッダーバー */
  .kr-head{background:#161616;padding:8px 14px;border-bottom:2px solid #2a2a2a;display:flex;align-items:center;gap:10px;flex-shrink:0;}
  .kr-head .kr-title{font-size:18px;font-weight:700;color:#e8e8e8;}
  .kr-head .kr-badge{font-size:15px;color:#888;background:#222;padding:3px 12px;border-radius:4px;white-space:nowrap;border:1px solid #333;}
  .kr-head .kr-nm{font-size:17px;font-weight:700;color:#e8e8e8;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .kr-head .kr-nm .kr-qty-sep{color:#888;font-weight:400;margin:0 4px;}
  .kr-head .kr-nm .kr-qty-val{color:#ccc;font-size:15px;font-weight:600;}
  .kr-head .kr-close{background:none;border:none;color:#666;font-size:22px;cursor:pointer;padding:0 4px;line-height:1;}
  .kr-head .kr-close:hover{color:#e8e8e8;}

  /* スクロールラッパー */
  .kr-scroll{overflow-y:auto;flex:1;min-height:0;}

  /* 更新日時表示＋サマリータブ（ヘッダー右） */
  .kr-updated{font-size:12px;color:#888;white-space:nowrap;margin-right:2px;}
  .kr-updated b{color:#bbb;font-weight:600;}
  .kr-sum-tab{background:#222;border:1px solid #3a3a3a;color:#d9b923;font-size:13px;
              font-weight:600;cursor:pointer;padding:5px 12px;border-radius:5px;white-space:nowrap;}
  .kr-sum-tab:hover{background:#2c2c2c;color:#f0d040;}
  .kr-sum-tab.on{background:#d9b923;color:#1c1c1c;border-color:#d9b923;}

  /* サマリーパネル */
  .kr-sum-wrap{padding:18px 22px;max-width:920px;margin:0 auto;color:#e8e8e8;}
  .kr-sum-wrap h2{font-size:17px;color:#d9b923;margin:0 0 4px;}
  .kr-sum-sub{font-size:12px;color:#888;margin-bottom:16px;}
  .kr-sum-cards{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:20px;}
  .kr-sum-card{background:#202020;border:1px solid #333;border-radius:8px;padding:12px 18px;min-width:150px;}
  .kr-sum-card .lbl{font-size:11px;color:#888;}
  .kr-sum-card .val{font-size:22px;font-weight:700;color:#e8e8e8;margin-top:3px;}
  .kr-sum-card .val.big{color:#d97757;}
  table.kr-sum-tbl{border-collapse:collapse;width:100%;font-size:13px;}
  table.kr-sum-tbl th{background:#1a1a1a;color:#aaa;font-size:12px;padding:7px 10px;
                      border-bottom:2px solid #444;text-align:left;white-space:nowrap;}
  table.kr-sum-tbl td{padding:6px 10px;border-bottom:1px solid #2a2a2a;white-space:nowrap;}
  table.kr-sum-tbl tr.start td{color:#7fd97f;}
  table.kr-sum-tbl tr.done td{color:#d97757;font-weight:600;border-top:2px solid #444;}
  table.kr-sum-tbl .diff{color:#d9b923;font-weight:600;}
  .kr-sum-empty{color:#888;padding:30px 0;text-align:center;}
  .kr-sum-note{font-size:11px;color:#777;margin-top:14px;line-height:1.6;}


  /* 品目スペック表（①ゾーン内で使用） */
  .kr-spec{width:100%;border-collapse:collapse;font-size:15px;}
  .kr-spec th,.kr-spec td{border:1px solid #222;padding:6px 6px;text-align:center;}
  .kr-spec th{background:#161616;color:#888;font-size:14px;font-weight:600;}
  .kr-spec td{background:#1c1c1c;color:#7ba7d9;}
  .kr-spec td.lbl{background:#161616;color:#888;font-size:11px;font-weight:600;}
  .kr-spec td.txt{text-align:left;color:#888;font-size:14px;padding:4px 6px;background:#161616;}
  .kr-spec select{background:#1c1c1c;border:none;color:#e8e8e8;font-size:15px;width:100%;outline:none;padding:3px;}

  /* 中央パネル（作業明細） */
  .kr-center{flex:1;min-width:0;min-height:0;display:flex;flex-direction:column;overflow:auto;}
  .kr-work{width:100%;border-collapse:collapse;font-size:15px;table-layout:fixed;}
  .kr-work th{background:#161616;color:#888;border:1px solid #4a4a4a;padding:7px 4px;text-align:center;white-space:nowrap;font-weight:600;}
  .kr-work tr{height:32px;}
  .kr-work td{border:1px solid #4a4a4a;padding:3px 3px;vertical-align:middle;background:#1c1c1c;}
  .kr-work input{background:#d8d8d8;border:1px solid #b0b0b0;border-radius:5px;color:#1a1a1a;font-size:16px;width:100%;text-align:center;padding:5px 3px;outline:none;}
  .kr-work input:focus{background:#fff;border-color:#7ba7d9;box-shadow:0 0 0 2px rgba(123,167,217,0.35);}
  .kr-work input::placeholder{color:#999;}
  .kr-work input.kr-draft{color:#888 !important;background:#c8c8c8 !important;}
  .kr-work td.ac{background:#1c1c1c;color:#7ba7d9;text-align:center;font-size:14px;padding:5px 3px;}
  .kr-work .kr-kansan-num.kr-ondan-miss{color:#d23b3b !important;}
  .kr-kansan-wrap{display:flex;align-items:center;justify-content:center;gap:6px;}
  .kr-kansan-num{font-size:14px;}
  .kr-tol{display:flex;flex-direction:column;font-size:10px;line-height:1.25;color:#888;text-align:left;}
  .kr-tol-p::before{content:'+';}
  .kr-tol-hidden{display:none !important;}
  .kr-work input.kr-keisoku-bad{color:#cc0000 !important;font-weight:700;background:#ffe0e0 !important;border-color:#d23b3b !important;}
  .kr-work td:focus-within{background:#1a2a3a !important;}
  .kr-work td:has(> input){padding:4px 5px !important;}
  .kr-work td:has(> input) > input{padding:4px 5px !important;min-height:0 !important;height:auto;}

  /* ショーケース（作業者） */
  .kr-showkase{margin-top:auto;border-top:2px solid #2a2a2a;display:flex;align-items:stretch;}
  .kr-showkase-R{flex:1;display:flex;flex-direction:column;padding:5px 7px;gap:5px;background:#181818;}
  .kr-showkase-note{font-size:14px;color:#888;padding:0;font-weight:600;}
  .kr-showkase.kr-showkase-compact{margin-top:1px;border-top:none;display:block;background:#161616;border:1px solid #2a2a2a;border-radius:4px;padding:5px 7px;}
  .kr-showkase.kr-showkase-compact .kr-showkase-note{margin-bottom:4px;}
  .kr-showkase .kr-sakusha-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;align-content:start;}
  .kr-showkase .kr-sakusha-grid input{background:#d8d8d8;border:1px solid #b0b0b0;border-radius:5px;color:#1a1a1a;font-size:15px;padding:6px 7px;outline:none;width:100%;text-align:center;}
  .kr-showkase .kr-sakusha-grid input:focus{background:#fff;border-color:var(--proc1);box-shadow:0 0 0 2px rgba(123,167,217,0.35);}
  .kr-showkase .kr-sakusha-grid input::placeholder{color:#999;font-size:14px;}
  .kr-tot-cell{display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .kr-sakusha-in-tot{margin-top:0;border-top:none;flex:1;width:100%;display:flex;align-items:center;gap:6px;padding:3px 6px;}
  .kr-sakusha-in-tot .kr-showkase-note{margin-bottom:0;}
  .kr-sakusha-in-tot .kr-sakusha-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;flex:1;width:100%;}
  .kr-tot-label{flex-shrink:0;}
  .kr-tot-cell{justify-content:flex-start;gap:14px;padding:6px 10px;}
  .kr-sakusha-in-tot.kr-sakusha-fill{flex:1 1 auto;width:auto;margin:0;}
  .kr-sakusha-in-tot.kr-sakusha-fill .kr-showkase-note{font-size:15px;flex-shrink:0;}
  .kr-sakusha-grid.kr-sakusha-grid-wide{grid-template-columns:repeat(4,1fr);gap:10px;flex:1;width:100%;}
  .kr-sakusha-grid.kr-sakusha-grid-wide input{font-size:17px;padding:9px 10px;}
  .kr-tot-values{flex-shrink:0;display:flex;align-items:center;gap:10px;padding-right:4px;text-align:right;}

  /* 右パネル */
  .kr-right{flex:0 0 168px;display:flex;flex-direction:column;gap:6px;min-height:0;}
  .kr-lot{width:100%;border-collapse:collapse;font-size:15px;}
  .kr-lot th,.kr-lot td{border:1px solid #222;padding:6px 4px;text-align:center;}
  .kr-lot th{background:#161616;color:#888;font-weight:600;font-size:14px;}
  .kr-lot td{background:#1c1c1c;}
  .kr-lot td:has(> input){padding:4px 4px !important;}
  .kr-lot td:has(> input) > input{min-height:0 !important;padding:3px 5px !important;height:auto !important;}
  .kr-lot input{background:#d8d8d8;border:1px solid #b0b0b0;border-radius:5px;color:#1a1a1a;font-size:16px;width:100%;text-align:center;outline:none;padding:2px 5px;}
  .kr-lot input:focus{background:#fff;border-color:#7ba7d9;box-shadow:0 0 0 2px rgba(123,167,217,0.35);}
  .kr-fry-wrap{flex:6;min-height:0;overflow:auto;}
  .kr-lot-wrap{flex:4;min-height:0;overflow:auto;}
  .kr-fry{width:100%;border-collapse:collapse;font-size:14px;}
  .kr-fry th{background:#161616;color:#888;border:1px solid #222;padding:6px 3px;font-weight:600;font-size:13px;}
  .kr-fry td{border:1px solid #222;padding:5px 3px;background:#1c1c1c;}
  .kr-fry td.fl{background:#161616;color:#888;font-size:13px;text-align:right;padding:5px 7px;width:50%;}
  .kr-fry input{background:#d8d8d8;border:1px solid #b0b0b0;border-radius:5px;color:#1a1a1a;font-size:15px;width:100%;text-align:center;outline:none;padding:3px 4px;}
  .kr-fry input:focus{background:#fff;border-color:#7ba7d9;box-shadow:0 0 0 2px rgba(123,167,217,0.35);}
  .kr-fry td:has(> input) > input{padding:2px 5px !important;min-height:0 !important;height:auto;}
  .kr-fry tr.tot td{background:#200a0a;}
  .kr-fry tr.tot input{color:var(--due);font-weight:700;}
  .kr-fry td+td{width:50%;}

  /* ヘッダー内ボタン（旧フッターから移設・高さに収まるよう小型化） */
  .kr-head-btns{display:flex;gap:6px;margin-left:6px;flex-shrink:0;}
  .kr-head-btns button{padding:6px 16px;border-radius:6px;font-size:15px;font-weight:700;cursor:pointer;border:none;line-height:1.4;}
  .kr-head-btns .kr-can-h{background:#222;color:#e8e8e8;border:1px solid #333;}
  .kr-head-btns .kr-can-h:hover{background:#2a2a2a;}
  .kr-head-btns .kr-sav-h{background:var(--deliv);color:#fff;}
  .kr-head-btns .kr-sav-h:hover{background:#3ab870;}
  .kr-head-btns .kr-comp-h{background:#3a7bd5;color:#fff;margin-left:14px;}
  .kr-head-btns .kr-comp-h:hover{background:#4a8ce5;}
  .kr-nav-wrap{display:flex;align-items:center;gap:4px;margin:0 10px;}
  .kr-nav-btn{background:#2a2a2a;color:#ccc;border:1px solid #444;border-radius:6px;font-size:15px;font-weight:700;cursor:pointer;padding:5px 14px;line-height:1.4;}
  .kr-nav-btn:hover{background:#3a3a3a;color:#fff;}
  .kr-nav-btn:disabled{opacity:0.3;cursor:default;}

  /* 使用Lot区切り線 */
  .kr-work .kr-lot-sep{border-left:2px solid #555 !important;}
  .kr-work th.kr-lot-sep{border-left:2px solid #666 !important;}
  /* 使用Lot列はハイライト除外（1行目・11行目） */
  .kr-work tr.kr-row-special td.kr-lot-sep,
  .kr-work tr.kr-row-special td.kr-lot-sep ~ td{background:#1c1c1c !important;}
  .kr-work tr.kr-row-hoten td.kr-lot-sep,
  .kr-work tr.kr-row-hoten td.kr-lot-sep ~ td{background:#1c1c1c !important;}

  /* スピナー非表示・英字大文字 */
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
  input[type=number]{-moz-appearance:textfield;}
  input[type=text]{text-transform:uppercase;}

  /* 1行目・補填行：斜線 */
  .kr-row-special td{background:rgba(180,80,20,0.22) !important;}
  .kr-row-special td.ac{background:rgba(180,80,20,0.12) !important;}
  .kr-row-special input{background:#ffc89a !important;border:1px solid #c06030 !important;border-radius:5px !important;color:#3a1a00 !important;}
  .kr-row-special input:focus{background:#ffd8b4 !important;border-color:#a04820 !important;box-shadow:0 0 0 2px rgba(210,120,60,0.35) !important;}
  .kr-work tr.kr-row-hoten td{background:#181822;border-top:2px solid #2a2a36;}
  .kr-work tr.kr-row-hoten td.ac{background:#181822;}
  .kr-work tr.kr-row-hoten input{background:#9fd4f8 !important;border:1px solid #3080c0 !important;border-radius:5px !important;color:#001a3a !important;}
  .kr-work tr.kr-row-hoten input:focus{background:#b8e0ff !important;border-color:#1060a0 !important;box-shadow:0 0 0 2px rgba(60,130,210,0.35) !important;}
  .kr-work tr.kr-row-special td:nth-child(n+3):nth-child(-n+5),
  .kr-work tr.kr-row-hoten   td:nth-child(n+3):nth-child(-n+5){position:relative;}
  .kr-work tr.kr-row-special td:nth-child(n+3):nth-child(-n+5)::after,
  .kr-work tr.kr-row-hoten   td:nth-child(n+3):nth-child(-n+5)::after{
    content:'';position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(to top right,transparent calc(50% - 0.8px),#6a6a6a calc(50% - 0.8px),#6a6a6a calc(50% + 0.8px),transparent calc(50% + 0.8px));
  }

  /* セルフル展開 */
  td:has(> input){padding:0 !important;}
  td:has(> input) > input{width:100% !important;height:100%;box-sizing:border-box;display:block;margin:0;padding:11px 6px;min-height:42px;text-align:center;}
  td:has(> textarea){padding:0 !important;}
  td:has(> textarea) > textarea{width:100% !important;box-sizing:border-box;display:block;margin:0;padding:10px 7px;}

  /* 納品数・注文数 不一致ハイライト */
  .kr-mismatch{border:2px solid #d23b3b !important;background:rgba(210,59,59,0.15) !important;}
  /* 箱数・使用数 不一致ハイライト（黄色） */
  .kr-mismatch-warn{border:2px solid #d9b923 !important;background:rgba(217,185,35,0.18) !important;}

  /* トースト */
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 18px;border-radius:8px;font-size:16px;opacity:0;transition:.3s;z-index:60;border:1px solid #444;pointer-events:none;}
  .toast.on{opacity:1;}

  /* 待機中ローディング */
  .waiting{display:flex;align-items:center;justify-content:center;height:100%;font-size:14px;color:#555;}

  /* ══════════════════════════════════════════════
     ゾーンレイアウト（①作業前確認・②加工後記入・③納品後確認）
     ══════════════════════════════════════════════ */
  .kr-main{flex:1; display:flex; gap:6px; padding:6px; overflow:hidden; min-height:0;}

  .kr-zone{border-radius:6px; padding:8px; display:flex; flex-direction:column; gap:6px; overflow:hidden; min-height:0;}
  .kr-zone-h{font-size:15px; font-weight:700; padding:5px 10px; border-radius:4px;}
  .kr-zone-body{flex:1; min-height:0; overflow:auto;}

  /* 左カラム：①（上）＋③（下）の二段積み */
  .kr-left-stack{flex:0 0 19%; min-width:160px; display:flex; flex-direction:column; gap:6px; min-height:0;}

  /* ① 作業前確認 */
  .kr-z1{flex:0 0 auto; background:#15191d; border:1px solid #2c3a47; min-height:0; padding:6px;}
  .kr-z1 .kr-zone-h{background:#26323e; color:#9fc3e0; padding:4px 8px; font-size:14px;}
  .kr-z1 .kr-zone-body{display:flex; align-items:center;}
  .kr-z1 .kr-spec{font-size:13px;}
  .kr-z1 .kr-spec th,.kr-z1 .kr-spec td{padding:4px 5px;}

  /* ③ 納品後確認（横ストリップで折り返し圧縮） */
  .kr-z3{flex:0 0 auto; background:#161d18; border:1px solid #2c4736;}
  .kr-z3 .kr-zone-h{background:#26392c; color:#9fdcb3;}
  /* ③ 納品後確認：6列グリッドで高さ・幅を統一 */
  .kr-z3-strip{display:grid; grid-template-columns:repeat(6,1fr); gap:6px;}
  /* 通常アイテム：各3列分 */
  .kr-z3-strip .kr-fl{grid-column:span 3;}
  /* 品名ワイド：全6列 */
  .kr-z3-strip .kr-fl.kr-fl-wide{grid-column:span 6;}
  /* 3アイテム行（注文数・入庫数・箱数）：各2列分 */
  .kr-z3-strip .kr-fl.kr-z3-sm{grid-column:span 2;}
  .kr-fl{min-width:0;}
  .kr-fl-lbl{font-size:13px; color:#888; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .kr-fl-box{
    background:#1c1c1c; border:1px solid #2a2a2a; border-radius:4px;
    padding:6px 8px; font-size:15px; color:#e8e8e8; height:34px; min-height:34px;
    display:flex; align-items:center; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;
    box-sizing:border-box;
  }
  .kr-fl-box.kr-fl-strong{font-weight:600;}
  .kr-fl-box.kr-fl-av{color:#7ba7d9; font-weight:700;}
  .kr-fl-box.kr-fl-input{padding:0;}
  .kr-fl-box.kr-fl-input input,.kr-fl-box.kr-fl-input select{
    background:transparent; border:none; color:#e8e8e8; font-size:15px; width:100%;
    height:34px; text-align:center; outline:none; padding:6px 8px; box-sizing:border-box;
  }
  .kr-fl-box.kr-fl-input input:focus,.kr-fl-box.kr-fl-input select:focus{background:#1a2030;}

  /* ② 加工後記入（フル高さ・主役） */
  .kr-z2{flex:1 1 auto; background:#1d1616; border:1px solid #3a2a2a; min-height:0;}
  .kr-z2 .kr-zone-h{background:#3a2626; color:#e0a99f;}
  .kr-z2-row{flex:1; display:flex; gap:6px; min-height:0; align-items:stretch;}

  /* 主列：作業明細（上）＋梱包方法（下）の縦積み */
  .kr-main-col{flex:1; min-width:0; display:flex; flex-direction:column; gap:6px; min-height:0;}

  /* 梱包方法ブロック（主列幅で作業明細の真下） */
  .kr-konpo-blk{flex:0 0 auto; background:#1c1c1c; border:1px solid #2a2a2a; border-radius:5px; padding:6px 8px;}
  .kr-konpo-ttl{font-size:13px; color:#888; font-weight:600; margin-bottom:6px;}
  .kr-konpo-row{
    background:#161616; border:1px solid #2a2a2a; border-radius:4px; color:#e8e8e8;
    font-size:14px; font-weight:600; padding:6px 9px; margin-bottom:4px;
    overflow:hidden; white-space:nowrap; text-overflow:ellipsis;
  }
  .kr-konpo-row:last-child{margin-bottom:0;}

  /* 加工Lotを梱包方法の底辺に揃えて下寄せ */
  .kr-lot-bottom{margin-top:auto;}

  /* 端数トグル */
  .kr-kakou-cell{padding:0 !important;}
  .kr-kakou-wrap{display:flex;align-items:stretch;height:100%;min-height:42px;}
  .kr-kakou-wrap input{flex:1;min-width:0;width:auto !important;border-radius:5px 0 0 5px !important;}
  .kr-hazusu-btn{
    flex-shrink:0;border:none;border-left:1px solid #b0b0b0;
    background:#c8c8c8;color:#666;font-size:10px;cursor:pointer;
    padding:0 5px;line-height:1;white-space:nowrap;border-radius:0 5px 5px 0;
    font-family:inherit;transition:background .15s,color .15s;
  }
  .kr-hazusu-btn:hover{background:#aaa;color:#333;}

function _ondanNorm(s) {
  return String(s == null ? '' : s).replace(/\s+/g, ' ').trim();
}

// ①の「+公差」「-公差」を換算セルの右に小さく2段表示するためのHTML
function _ondanTolHTML() {
  const p = document.getElementById('k2-plus-k')?.textContent?.trim();
  const m = document.getElementById('k2-minus-k')?.textContent?.trim();
  const pv = (p && p !== '—') ? p : '';
  const mv = (m && m !== '—') ? m : '';
  if (!pv && !mv) return '';
  return `<span class="kr-tol"><span class="kr-tol-p">${pv}</span><span class="kr-tol-m">${mv}</span></span>`;
}

// 品名と温度から換算(C)を引く。見つからなければ null
function lookupOndanC(productName, temp) {
  const nm = _ondanNorm(productName);
  const t  = String(temp == null ? '' : temp).trim();
  if (!nm || !t) return null;
  // シート上の連結ルールが「そのまま」「2桁ゼロ詰め」両方あるため両方試す
  const candidates = [nm + t];
  if (/^\d{1}$/.test(t)) candidates.push(nm + '0' + t);
  if (/^\d{1,2}$/.test(t)) candidates.push(nm + ' ' + t); // 念のためスペース区切りも
  for (const key of candidates) {
    const hit = ONDAN_FLAT[_ondanNorm(key)];
    if (hit) return hit[1]; // C(換算)値
  }
  return null;
}

// 行の温度入力 → 換算セルを更新
function updateOndanKansan(inputEl) {
  const ri = inputEl?.dataset?.row;
  if (ri == null) return;
  const numEl = document.getElementById('k2-kansan-' + ri);
  if (!numEl) return;
  const nm = document.getElementById('k2-nm-v')?.textContent || '';
  const hasOndo = !!inputEl.value.trim();
  const c = lookupOndanC(nm, inputEl.value);
  numEl.textContent = (c != null) ? Number(c).toFixed(2) : '';
  numEl.dataset.val = (c != null) ? c : '';
  numEl.classList.toggle('kr-ondan-miss', hasOndo && c == null);
  // 温度が未入力なら公差(±)を隠す
  const tolEl = numEl.parentElement?.querySelector('.kr-tol');
  if (tolEl) tolEl.classList.toggle('kr-tol-hidden', !hasOndo);
  // 換算値が変わったので計測値の範囲チェックも更新
  checkKeisokuRange(ri);
}

// ①の「+公差」「-公差」を数値として取得（符号の入り方に揺れがあっても±どちらにも対応）
function _ondanTolNums() {
  const toNum = s => {
    if (s == null) return null;
    let t = String(s).trim();
    if (!t || t === '—') return null;
    // 全角マイナス（－ U+FF0D / − U+2212）を半角に正規化してから数値化
    t = t.replace(/[\u2212\uFF0D]/g, '-');
    const n = parseFloat(t.replace(/[^0-9.\-]/g, ''));
    return isFinite(n) ? n : null;
  };
  return {
    plus:  toNum(document.getElementById('k2-plus-k')?.textContent),
    minus: toNum(document.getElementById('k2-minus-k')?.textContent)
  };
}

// 計測値が「換算値±公差」の範囲から外れていたら赤字にする
function checkKeisokuRange(ri) {
  const tr = document.querySelector('#k2-daily-body input[data-row="'+ri+'"][data-col="2"]')?.closest('tr');
  if (!tr) return;
  const numEl     = document.getElementById('k2-kansan-' + ri);
  const keisokuEl = tr.querySelector('input[data-col="3"]');
  if (!numEl || !keisokuEl) return;
  const cVal = (numEl.dataset.val !== undefined && numEl.dataset.val !== '') ? parseFloat(numEl.dataset.val) : NaN;
  const kVal = parseFloat(keisokuEl.value);
  let bad = false;
  if (isFinite(cVal) && isFinite(kVal)) {
    const { plus, minus } = _ondanTolNums();
    if (plus != null && minus != null) {
      const lo = cVal + Math.min(plus, minus);
      const hi = cVal + Math.max(plus, minus);
      bad = (kVal < lo || kVal > hi);
    }
  }
  keisokuEl.classList.toggle('kr-keisoku-bad', bad);
}

// 全行ぶん再計算（記録読み込み時など）
function refreshAllOndanKansan() {
  document.querySelectorAll('#k2-daily-body input[data-col="2"]').forEach(updateOndanKansan);
}

// URL パラメーターから初期化（postMessage 不要）
// ══════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', async function() {
  const params = new URLSearchParams(location.search);
  const metaStr = params.get('meta');
  const specStr = params.get('spec');
  if(!metaStr) return;   // パラメーターなし = 直接アクセス → スケルトン表示のまま

  _meta   = JSON.parse(metaStr);
  _specRx = specStr ? JSON.parse(specStr) : null;

  // 既存記録を同一オリジン fetch（http://localhost:8503/）
  let existing = null;
  try {
    const resp = await fetch('/', {cache:'no-store'});
    if(resp.ok) {
      const all = await resp.json();
      _allRecords = all;
      existing = all.find(r => String(r.meisai_no) === String(_meta.no)) || null;
    }
  } catch(_e) {}

  _initFromData(_meta, _specRx, existing);
});

function _initFromData(r, spec, existing) {
  const noDisp = String(r.no).replace(/^0+/,'');
  document.getElementById('k2-badge').textContent = noDisp + '  ' + (r.grp || '');
  document.getElementById('k2-nm-h').firstChild.textContent = r.nm;
  document.getElementById('k2-qty-h').textContent = r.qty ?? '—';
  document.getElementById('k2-no').textContent    = noDisp;
  document.getElementById('k2-nm-v').textContent  = r.nm;
  document.getElementById('k2-qty').textContent   = r.qty;
  { const adEl = document.getElementById('k2-nohin-bi'); if (adEl) adEl.textContent = r.ad || '—'; }
  _fillKrSpec(spec);
  _fillKrForm(existing);
}

// 全角の数字・符号を半角に正規化（①の公差表示を統一するため）
function _toHalfSign(v) {
  if (v == null) return v;
  return String(v)
    .replace(/[\uFF10-\uFF19]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0))
    .replace(/[\u2212\uFF0D]/g, '-')
    .replace(/\uFF0B/g, '+')
    .replace(/[\uFF0E]/g, '.');
}

function _fillKrSpec(sp) {
  const set = (id,v) => { const e=document.getElementById(id); if(e) e.textContent=(v==null||v==='')?'—':v; };
  set('k2-lsun',   sp && sp.center);
  set('k2-setdan', sp && sp.setdan);
  set('k2-toru',   sp && sp.toru);
  set('k2-ondo-k', sp && sp.ondo);
  set('k2-plus-k', sp ? _toHalfSign(sp.plus) : null);
  set('k2-minus-k',sp ? _toHalfSign(sp.minus) : null);
  set('k2-spec-hako', sp ? sp.hako : null);
  set('k2-spec-irisu', sp != null ? sp.irisu : null);
  // k2-konpo-su は updateKrSummary で動的計算
  set('k2-konpo-h1', sp && sp.hoho1);
  set('k2-konpo-h2', sp && sp.hoho2);
  set('k2-konpo-h3', sp && sp.hoho3);
  const sel = document.getElementById('k2-konpo-hako');
  if(sel){
    sel.innerHTML = '<option value="">—</option>';

function _fillKrForm(d) {
  _krCompleted = (d?.kanryo === true);
  _kanryoAt    = d?.kanryo_at || '';
  _updatedAt   = d?.updated_at || '';
  renderUpdatedLabel();
  const set = (id, v) => { const e = document.getElementById(id); if(e) e.value = (v ?? ''); };
  set('k2-nyuko-bi', d?.nyuko_bi);
  set('k2-kizai-f',  d?.kizai_furyou != null ? d.kizai_furyou : '');
  set('k2-kakoubi',  d?.kakoubi);
  set('k2-lot2',     d?.lot2);
  set('k2-hotensuu', d?.hotensuu != null ? d.hotensuu : '');
  // 作業者4人
  const sakushas = d?.sakushas || (d?.sakusha ? [d.sakusha] : []);
  for(let i = 0; i < 4; i++) set('k2-sakusha-'+i, sakushas[i] || '');
  // 不良内訳

    const el = document.getElementById('f2-'+k);
    if(el) el.value = f[k] ? f[k] : '';
  });
  calcKrFuryou();
  _buildLotRows(d);
  updateNyukoBi();
  // 作業明細（固定10行）row_idxで正しい行に配置（古いデータはフォールバックで順番通り）
  const daily = d?.daily || [];
  const dailyMap = {};
  daily.forEach((entry, fallbackIdx) => {
    const idx = (entry.row_idx !== undefined) ? entry.row_idx : fallbackIdx;
    dailyMap[idx] = entry;
  });
  const tbody = document.getElementById('k2-daily-body');
  tbody.innerHTML = '';
  for(let i = 0; i < KR_FIXED_ROWS; i++) _addKrRow(dailyMap[i] || null, i);
  refreshAllOndanKansan();
  updateKrSummary();
  _krReady = true; // フォーム初期化完了 → オートセーブ許可
  setTimeout(() => {
    const first = document.querySelector('#k2-daily-body input[data-row="0"][data-col="0"]');
    if(first) first.focus();
  }, 50);
}

function _buildLotRows(d) {
  const tbody = document.getElementById('k2-lot-body');

  if(lots.length === 0 && (d?.kakou_lot || d?.hako_su))
    lots.push({lot: d.kakou_lot || '', hako: d.hako_su || ''});
  for(let i = 0; i < KR_LOT_ROWS; i++) {
    const tr = document.createElement('tr');
    const lot  = lots[i]?.lot  || '';
    const hako = (lots[i]?.hako != null && lots[i]?.hako !== 0) ? lots[i].hako : '';

      <td><input type="text" id="k2-lot-${i}"  value="${lot}"  style="width:88px" autocomplete="off"></td>
      <td><input type="text" id="k2-hako-${i}" value="${hako}" style="width:36px" autocomplete="off" oninput="updateKrSummary()"></td>

    tbody.appendChild(tr);

}

const _kzNum = v => { const n = parseFloat(String(v==null?'':v).replace(/[^0-9.\-]/g,'')); return isFinite(n)?n:NaN; };

function calcKizaiKans(){
  const toru = _kzNum(document.getElementById('k2-toru')?.textContent);
  let sum = 0;
  let hazaiSum = 0;
  document.querySelectorAll('#k2-daily-body tr, #k2-hoten-body tr').forEach(tr => {
    const kin  = tr.querySelector('input[data-col="4"]');
    const klot = tr.querySelector('input[data-col="1"]');
    const ri   = parseInt(kin?.dataset.row ?? '-1', 10);
    const kakou = _kzNum(kin?.value);
    const isHazai   = (klot?.value||'').trim() === '端材';
    const isHazusu  = tr.querySelector('.kr-hazusu-btn')?.classList.contains('on');
    if(isHazai || isHazusu){
      if(isFinite(kakou) && kakou > 0) hazaiSum += kakou;
    } else if(isFinite(kakou) && kakou > 0 && isFinite(toru) && toru > 0){
      const v = kakou / toru;
      const floor = (ri === 0 || ri === 10);
      sum += floor ? Math.floor(v) : Math.ceil(v);
    }
  });
  // 使用基材数(k2-kizai-s)は②の基材換算合計(lhKansTotal)からそのまま引くため、
  // ここでは書き込まない（sumは未使用）。
  // 端材使用
  const he = document.getElementById('k2-hazai-s');
  if(he) he.textContent = hazaiSum || 0;
}

function calcKrFuryou() {
  const keys = ['kizu','kubomi','imono','kake','meyani','beko','osen','keijo','sonota'];
  const total = keys.reduce((s,k) => s + (parseInt(document.getElementById('f2-'+k)?.value||'0',10)||0), 0);
  const tel = document.getElementById('f2-total'); if(tel) tel.value = total || '';
  const sel = document.getElementById('k2-sei-s'); if(sel) sel.textContent = total || '';
  // 補填行（11行目）の加工数 = 不良合計に自動連動
  const hot = document.getElementById('k2-hotensuu'); if(hot) hot.value = total > 0 ? total : '';
  // ③基材不良 = 不良合計 ÷ 取数（切り上げ）
  const toru = parseInt(document.getElementById('k2-toru')?.textContent||'0', 10) || 1;
  const kizai = total > 0 ? Math.ceil(total / toru) : 0;
  const kf = document.getElementById('k2-kizai-f'); if(kf) kf.value = kizai || '';
  calcKizaiKans();  // 基材換算を再計算
}

function updateKrSummary() {
  let kakouSum = 0;
  document.querySelectorAll('#k2-daily-body tr').forEach(tr => {
    const kakouIn = tr.querySelector('input[data-col="4"]');
    kakouSum += parseInt(kakouIn?.value||'0',10)||0;
  });
  let kakouTotal = kakouSum;
  const _lot2 = (document.getElementById('k2-lot2')?.value || '').trim();
  if(_lot2) kakouTotal += parseInt(document.getElementById('k2-hotensuu')?.value||'0',10)||0;
  const kt = document.getElementById('k2-kakou-total'); if(kt) kt.textContent = kakouTotal || '';
  // ③箱数 = ②加工ロットの箱数欄の合計
  let hakoTotal = 0;
  for(let i = 0; i < KR_LOT_ROWS; i++) {
    hakoTotal += parseInt(document.getElementById('k2-hako-'+i)?.value||'0', 10) || 0;
  }
  const hkEl = document.getElementById('k2-hako-total'); if(hkEl) hkEl.textContent = hakoTotal + ' C/S';
  calcKrFuryou();
  calcKizaiKans();
  // ③納品数 = 加工数合計 - 製品不良（calcKrFuryou後に計算）
  const keys = ['kizu','kubomi','imono','kake','meyani','beko','osen','keijo','sonota'];
  const furyouSum = keys.reduce((s,k) => s + (parseInt(document.getElementById('f2-'+k)?.value||'0',10)||0), 0);
  const kakouNet = kakouTotal - furyouSum;
  const ke = document.getElementById('k2-kakou-s'); if(ke) ke.textContent = kakouNet > 0 ? kakouNet : 0;
  // ③入庫数 = ②加工数（日次行合計）- 不良合計
  const nyukoEl = document.getElementById('k2-nyuko-su');
  const nyuko = Math.max(0, kakouTotal - furyouSum);
  if(nyukoEl) nyukoEl.textContent = nyuko;
  // 注文数 vs 入庫数 不一致：判定だけ行い、ハイライトは「完了」ボタン押下時のみ表示する
  const qtyEl   = document.getElementById('k2-qty');
  const qty     = parseInt(qtyEl?.textContent||'', 10);
  _krQtyMismatch = !isNaN(qty) && qty !== nyuko;
  setKrMismatchHighlight(false);  // 入力中は毎回クリア（前回「完了」時のハイライト残りも消す）
  const nak = kakouNet > 0 ? kakouNet : 0;
  // 使用数 = ceil(入庫数 ÷ 入数)
  const irisu = parseInt(document.getElementById('k2-spec-irisu')?.textContent||'0', 10) || 0;
  const suEl  = document.getElementById('k2-konpo-su');
  const hasuEl = document.getElementById('k2-konpo-hasu');
  if(irisu > 0 && nyuko > 0) {
    const raw   = nyuko / irisu;
    const ceiled = Math.ceil(raw);
    const hasHasu = raw !== ceiled;
    if(suEl)  suEl.textContent  = ceiled;
    if(hasuEl) hasuEl.textContent = hasHasu ? '端数品あり' : '';
  } else {
    if(suEl)  suEl.textContent  = '—';
    if(hasuEl) hasuEl.textContent = '';
  }
  // 箱数 vs 使用数 不一致：判定だけ行い、ハイライトは「完了」ボタン押下時のみ表示する
  const suNum = parseInt(suEl?.textContent||'', 10);
  _krHakoMismatch = !isNaN(suNum) && hakoTotal !== suNum;
  setKrHakoMismatchHighlight(false);  // 入力中は毎回クリア
  // ロット使用数集計（計測Lotでグループ集計）
  const lotMap = new Map();
  document.querySelectorAll('#k2-daily-body tr, #k2-hoten-body tr').forEach(tr => {
    const lotIn    = tr.querySelector('input[data-col="1"]');
    const kakouIn  = tr.querySelector('input[data-col="4"]');
    const hazusuOn = tr.querySelector('.kr-hazusu-btn')?.classList.contains('on');
    const lot = lotIn?.value?.trim();
    if(!lot || lotIn?.dataset?.draft === '1') return;
    if(hazusuOn) return;  // 端数オン：使用Lot/加工数/基材換算から除外
    const su = parseInt(kakouIn?.value||'0', 10) || 0;
    lotMap.set(lot, (lotMap.get(lot) || 0) + su);
  });
  const lotEntries = [...lotMap.entries()];
  const toruLh = _kzNum(document.getElementById('k2-toru')?.textContent) || 1;
  let lhSuTotal = 0, lhKansTotal = 0;
  for(let i = 0; i < 5; i++) {
    const lotEl   = document.getElementById('k2-lh-lot-'  + i);
    const suEl2   = document.getElementById('k2-lh-su-'   + i);
    const kansEl  = document.getElementById('k2-lh-kans-' + i);
    if(i < lotEntries.length) {
      const [lot, su] = lotEntries[i];
      const isHazai = lot === '端材';
      const kans = (!isHazai && su > 0 && toruLh > 0) ? Math.ceil(su / toruLh) : 0;
      if(lotEl)  lotEl.textContent  = lot;
      if(suEl2)  suEl2.textContent  = su;
      if(kansEl) kansEl.textContent = isHazai ? '—' : (kans || '—');
      lhSuTotal   += su;
      lhKansTotal += kans;
    } else {
      if(lotEl)  lotEl.textContent  = '—';
      if(suEl2)  suEl2.textContent  = '—';
      if(kansEl) kansEl.textContent = '—';
    }
  }
  const lhSuTotEl   = document.getElementById('k2-lh-su-total');
  const lhKansTotEl = document.getElementById('k2-lh-kans-total');
  if(lhSuTotEl)   lhSuTotEl.textContent   = lhSuTotal   || '';
  if(lhKansTotEl) lhKansTotEl.textContent = lhKansTotal || '';
  // ③使用基材数 = ②基材換算の合計をそのまま引く
  const kizaiSEl = document.getElementById('k2-kizai-s');
  if(kizaiSEl) kizaiSEl.textContent = lhKansTotal || '—';
}

// 日付補正
// ══════════════════════════════════════════════
function schedMonth(){ return new Date().getMonth()+1; }

function normalizeWorkDate(el){
  const v=(el.value||'').trim();
  if(!v)return;
  let mm,dd,m;
  if(/^\d{1,2}$/.test(v)){ mm=schedMonth(); dd=+v; }
  else if((m=/^(\d{1,2})\s*[\/\-.]\s*(\d{1,2})$/.exec(v))){ mm=+m[1]; dd=+m[2]; }
  else return;
  if(mm<1||mm>12||dd<1||dd>31)return;
  const out=String(mm).padStart(2,'0')+'/'+String(dd).padStart(2,'0');
  if(out!==el.value) el.value=out;
}

function normalizeLotDate(el){
  const v=(el.value||'').trim();
  if(!v)return;
  const now=new Date();
  let YY=String(now.getFullYear()%100).padStart(2,'0'), mm, dd, m;
  if(/^\d{1,2}$/.test(v)){ mm=now.getMonth()+1; dd=+v; }
  else if((m=/^(\d{1,2})\s*[\/\-.]\s*(\d{1,2})$/.exec(v))){ mm=+m[1]; dd=+m[2]; }
  else if((m=/^(\d{2,4})\s*[\/\-.]\s*(\d{1,2})\s*[\/\-.]\s*(\d{1,2})$/.exec(v))){ YY=String((+m[1])%100).padStart(2,'0'); mm=+m[2]; dd=+m[3]; }
  else return;
  if(mm<1||mm>12||dd<1||dd>31)return;
  const out=YY+'.'+String(mm).padStart(2,'0')+'.'+String(dd).padStart(2,'0');
  if(out!==el.value) el.value=out;
}

function updateNyukoBi(){
  const el=document.getElementById('k2-nyuko-bi'); if(!el)return;
  let best=null;
  for(let i=0;i<KR_LOT_ROWS;i++){
    const m=/^(\d{2})\.(\d{1,2})\.(\d{1,2})$/.exec((document.getElementById('k2-lot-'+i)?.value||'').trim());
    if(!m)continue;
    const ord=(+m[1])*10000+(+m[2])*100+(+m[3]);
    if(best===null||ord>best.ord) best={ord,mm:+m[2],dd:+m[3]};
  }
  if(best) el.value=String(best.mm).padStart(2,'0')+'/'+String(best.dd).padStart(2,'0');
}

// ══════════════════════════════════════════════
// 計測ロット書式
// ══════════════════════════════════════════════
function lotFmt(raw){
  let out='';
  for(let i=0;i<raw.length;i++){
    if(i===2||i===3) out+=' ';
    if(i===5 && /\d/.test(raw[i])) out+='-';
    out+=raw[i];
  }
  return out;
}
function formatKeisokuLot(el){
  const caret=el.selectionStart;
  const k=el.value.slice(0,caret).replace(/[ -]/g,'').length;
  const raw=el.value.replace(/[ -]/g,'');
  const out=lotFmt(raw);
  if(out===el.value) return;
  el.value=out;
  const np=lotFmt(raw.slice(0,k)).length;
  try{el.setSelectionRange(np,np);}catch(_){}
}

// 完了ボタン：不一致があればハイライトして知らせ、無ければ完了フラグを立てて保存
async function completeKiroku() {
  updateKrSummary();
  if(_krQtyMismatch || _krHakoMismatch) {
    if(_krQtyMismatch)  setKrMismatchHighlight(true);
    if(_krHakoMismatch) setKrHakoMismatchHighlight(true);
    const msgs = [];
    if(_krQtyMismatch)  msgs.push('注文数と入庫数');
    if(_krHakoMismatch) msgs.push('箱数と使用数');
    toast(msgs.join('・')+'が一致していません。ご確認ください ⚠️');
    return;
  }
  setKrMismatchHighlight(false);
  setKrHakoMismatchHighlight(false);
  // 作業者バリデーション（1つ以上入力されていればOK）
  const sakushaEls = Array.from({length:4}, (_,i) => document.getElementById('k2-sakusha-'+i)).filter(Boolean);
  const hasSakusha = sakushaEls.some(el => el.value.trim());
  if(!hasSakusha) {
    sakushaEls.forEach(el => { el.style.border = '2px solid #2e9e5b'; el.style.background = 'rgba(46,158,91,0.18)'; });
    toast('作業者を1人以上入力してください ⚠️');
    sakushaEls[0].focus();
    return;
  }
  sakushaEls.forEach(el => { el.style.border = ''; el.style.background = ''; });
  _krCompleted = true;
  _kanryoAt = new Date().toISOString();  // 完了時刻を所要時間の終点に使う
  await saveKiroku();
  if(_summaryOpen) buildSummary();
}

function _buildRecord() {
  if(!_meta) return null;
  const r = _meta;
  const daily = [];
  document.querySelectorAll('#k2-daily-body tr').forEach((tr, rowIdx) => {
    const inSakugyobi = tr.querySelector('input[data-col="0"]');
    const inLot       = tr.querySelector('input[data-col="1"]');
    const inOndo      = tr.querySelector('input[data-col="2"]');
    const inKeisoku   = tr.querySelector('input[data-col="3"]');
    const inKakou     = tr.querySelector('input[data-col="4"]');
    // draft='1'は表示用フラグのみ。inp.valueには正しい値が入っているので保存時は無視する
    const dsv = inp => inp?.value?.trim() || '';
    const dnv = inp => parseFloat(inp?.value || '0') || 0;
    const sakugyobi = dsv(inSakugyobi);
    const kakou_su  = parseInt(inKakou?.value||'0',10)||0;
    // 作業日・加工数が空でも、計測Lot/温度/計測値のどれかが入っていれば行を残す
    const _hasMeas = dsv(inLot) || dnv(inOndo) || dnv(inKeisoku);
    if(!sakugyobi && !kakou_su && !_hasMeas) return;
    const hazusu = tr.querySelector('.kr-hazusu-btn')?.classList.contains('on') ? 1 : 0;
    daily.push({ row_idx: rowIdx, sakugyobi, keisoku_lot: dsv(inLot),
      ondo: dnv(inOndo), keisoku: dnv(inKeisoku), kakou_su, hazusu,
      keisoku_ts: (inKeisoku?.dataset?.ts || '') });
  });
  const lots = [];
  for(let i = 0; i < KR_LOT_ROWS; i++) {
    const lot  = document.getElementById('k2-lot-'+i)?.value?.trim()||'';
    const hako = parseInt(document.getElementById('k2-hako-'+i)?.value||'0',10)||0;
    if(lot || hako) lots.push({lot, hako});
  }
  const sakushas = [];
  for(let i = 0; i < 4; i++)
    sakushas.push(document.getElementById('k2-sakusha-'+i)?.value?.trim()||'');
  const iv = id => parseInt(document.getElementById(id)?.value||'0',10)||0;
  const sv = id => document.getElementById(id)?.value?.trim()||'';
  return {
    schema_version: 1,
    meisai_no: String(r.no), hinmei: r.nm, qty: r.qty, grp: r.grp||'',
    nohin_bi: r.ad||'',
    konpo_hako: sv('k2-konpo-hako'),
    konpo_su: parseInt((document.getElementById('k2-konpo-su')?.textContent||'').replace(/[^0-9]/g,'')||'0',10)||0,
    kakou_lot: lots[0]?.lot||'', hako_su: lots[0]?.hako||0, lots,
    nyuko_bi: sv('k2-nyuko-bi'), nyuko_su: parseInt(document.getElementById('k2-nyuko-su')?.textContent||'0',10)||0,
    kizai_furyou: iv('k2-kizai-f'), daily,
    kizai_su: parseInt(document.getElementById('k2-kizai-s')?.textContent||'0',10)||0,
    furyou:{ kizu:iv('f2-kizu'), kubomi:iv('f2-kubomi'), imono:iv('f2-imono'),
             kake:iv('f2-kake'), meyani:iv('f2-meyani'), beko:iv('f2-beko'),
             osen:iv('f2-osen'), keijo:iv('f2-keijo'), sonota:iv('f2-sonota') },
    sakusha: sakushas[0]||'', sakushas,
    kakoubi: sv('k2-kakoubi'), lot2: sv('k2-lot2'),
    hotensuu: iv('k2-hotensuu'), updated_at: (_updatedAt = new Date().toISOString()),
    kanryo: _krCompleted, kanryo_at: _kanryoAt,
  };
}

async function saveKiroku(silent=false) {
  if(!_meta) return;
  const record = _buildRecord();
  if(!record) return;
  renderUpdatedLabel();
  try {
    const resp = await fetch('http://localhost:'+KAKOU_PORT+'/', {
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(record)
    });
    if(resp.ok){
      if(!silent) toast(_krCompleted ? '加工記録を完了として保存しました ✓' : '加工記録を保存しました（下書き）✓');
      _krDirty = false;
    }
    else if(!silent) toast('保存エラー: '+resp.status);
  } catch(e){ if(!silent) toast('保存エラー: '+e.message); }
}

// ひとつ上の行の同列の値を下書き（グレー表示）としてコピーする
const KR_DRAFT_COLS = ['0','1','2','3'];
document.addEventListener('focusin', e => {
  const el = e.target;
  if(el.tagName !== 'INPUT' || !el.dataset) return;
  const ci = el.dataset.col;
  if(!KR_DRAFT_COLS.includes(ci)) return;
  if(el.value) { el.select(); return; }
  const ri = parseInt(el.dataset.row, 10);
  if(isNaN(ri) || ri <= 0) return;
  const above = document.querySelector(
    `#k2-daily-body input[data-row="${ri-1}"][data-col="${ci}"], #k2-hoten-body input[data-row="${ri-1}"][data-col="${ci}"]`
  );
  if(above && above.value && above.dataset.draft !== '1'){
    el.value = above.value;
    el.dataset.draft = '1';
    el.classList.add('kr-draft');
    el.select();
  }
});

// focusout：作業日補正・Lot日付補正
document.addEventListener('focusout', e => {
  const el = e.target;
  if(el.tagName !== 'INPUT') return;
  if(el.dataset && el.dataset.col === '0') normalizeWorkDate(el);
  if(/^k2-lot-\d+$/.test(el.id)){
    normalizeLotDate(el); updateNyukoBi();
    const _raw = el.value.replace(/[ -]/g,'');
    if(_raw.length === 6 && /\d/.test(_raw[5])){ el.value = lotFmt(_raw.slice(0,5) + '0' + _raw.slice(5)); }
    else if(_raw.length === 6){ el.value = lotFmt(_raw); }
  }
  // 計測Lot列：6桁で終わる場合は先頭に0を挿入（末尾が数字のときのみ） → 0埋め後に使用Lot列を再集計
  if(el.dataset && el.dataset.col === '1'){
    const raw = el.value.replace(/[ -]/g,'');
    if(raw.length === 6 && /\d/.test(raw[5])){ el.value = lotFmt(raw.slice(0,5) + '0' + raw.slice(5)); }
    else if(raw.length === 6){ el.value = lotFmt(raw); }
    updateKrSummary();
  }
});

// 加工Lot・箱数・不良数のキーナビ
const KR_VGROUPS = [
  ['k2-lot-0','k2-lot-1','k2-lot-2','k2-lot-3','k2-lot-4'],
  ['k2-hako-0','k2-hako-1','k2-hako-2','k2-hako-3','k2-hako-4'],
  ['f2-kizu','f2-kubomi','f2-imono','f2-kake','f2-meyani','f2-beko','f2-sonota'],
];
const KR_ENTER_SEQ = (()=>{ const a=[]; for(let i=0;i<5;i++){ a.push('k2-lot-'+i,'k2-hako-'+i); } return a; })();
document.addEventListener('keydown', e => {
  if(e.key !== 'Enter' && e.key !== 'ArrowDown' && e.key !== 'ArrowUp') return;
  const id = e.target && e.target.id;
  if(!id) return;
  let t = null;
  if(e.key === 'Enter'){
    if(KR_ENTER_SEQ.includes(id)){
      const ni = KR_ENTER_SEQ.indexOf(id)+1; e.preventDefault();
      if(ni < KR_ENTER_SEQ.length) t = document.getElementById(KR_ENTER_SEQ[ni]);
    } else {
      const g = KR_VGROUPS.find(a => a.includes(id)); if(!g) return;
      const ni = g.indexOf(id)+1; e.preventDefault();
      if(ni < g.length) t = document.getElementById(g[ni]);
    }
  } else {
    const g = KR_VGROUPS.find(a => a.includes(id)); if(!g) return;
    const ni = g.indexOf(id)+((e.key==='ArrowUp')?-1:1); e.preventDefault();
    if(ni >= 0 && ni < g.length) t = document.getElementById(g[ni]);
  }
  if(t){ t.focus(); if(t.select) t.select(); }
});

// 作業明細テーブル キーボードナビゲーション + Esc
document.addEventListener('keydown', function(e) {
  if(e.key === 'Escape'){ closeKiroku(); e.preventDefault(); return; }
  const el = e.target;
  const ri = parseInt(el.dataset?.row ?? '-1', 10);
  const ci = parseInt(el.dataset?.col ?? '-1', 10);
  if(ri < 0 || ci < 0) return;
  const KR_LAST_ROW = KR_FIXED_ROWS; // 補填行（11行目, data-row="10"）も含める
  let nr = ri, nc = ci, dir = 1;
  // Enter は「右のマスへ」。加工数（最終列）の Enter は次行の作業日列へ折り返す
  if((e.key === 'Enter') || (e.key === 'Tab' && !e.shiftKey) || e.key === 'ArrowRight') {
    nc = ci+1; if(nc > KR_MAX_COL){ nc=0; nr=Math.min(ri+1, KR_LAST_ROW); }
    dir = 1;
  }
  else if((e.key === 'Tab' && e.shiftKey) || e.key === 'ArrowLeft') {
    nc = ci-1; if(nc < 0){ nc=KR_MAX_COL; nr=Math.max(ri-1, 0); }
    dir = -1;
  }
  else if(e.key === 'ArrowDown') { nr = Math.min(ri+1, KR_LAST_ROW); dir = -1; }
  else if(e.key === 'ArrowUp')   { nr = Math.max(ri-1, 0); dir = -1; }
  else return;
  // 下書き表示のまま移動・確定する場合は、表示中の値で確定とする
  if(el.tagName === 'INPUT' && el.dataset && el.dataset.draft === '1'){
    el.dataset.draft = ''; el.classList.remove('kr-draft');
    _krDirty = true;
    if(el.dataset.col === '1') updateKrSummary();   // ロット使用数を即時更新
    if(el.dataset.col === '2') updateOndanKansan(el); // 温度換算を即時更新
  }
  e.preventDefault();
  function _goCell(nr, nc, dir) {
    for(let i = 0; i <= KR_MAX_COL; i++) {
      const t = document.querySelector(
        '#k2-daily-body input[data-row="'+nr+'"][data-col="'+nc+'"], #k2-hoten-body input[data-row="'+nr+'"][data-col="'+nc+'"]'
      );
      if(t){ t.focus(); t.select(); return; }
      nc += dir;
      if(nc < 0 || nc > KR_MAX_COL) return;
    }
  }
  _goCell(nr, nc, dir);
});

// 会社の稼働時間と休憩（分単位・0時起点）
//   稼働 07:55–17:05 から 休憩3本を除いた稼働セグメント
const KR_WORK_SEGS = [[475,600],[610,740],[785,900],[910,1025]];
//   07:55=475 / 10:00=600 10:10=610 / 12:20=740 13:05=785 / 15:00=900 15:10=910 / 17:05=1025

// 2時刻(ms)間の「実稼働分」を返す。休憩・時間外・夜間(日跨ぎ)を除外。
function krWorkMinutes(ms1, ms2){
  if(!(ms2 > ms1)) return 0;
  let total = 0;
  // ms1 の当日0時から1日ずつ走査
  const d0 = new Date(ms1); d0.setHours(0,0,0,0);
  for(let day = d0.getTime(); day <= ms2; day += 86400000){
    for(const [s,e] of KR_WORK_SEGS){
      const segS = day + s*60000;
      const segE = day + e*60000;
      const a = Math.max(ms1, segS);
      const b = Math.min(ms2, segE);
      if(b > a) total += (b - a);
    }
  }
  return Math.round(total / 60000); // 分
}

// 分 → "H時間M分"
function krFmtDur(min){
  if(min == null) return '—';
  if(min <= 0) return '0分';
  const h = Math.floor(min / 60), m = min % 60;
  return (h ? h + '時間' : '') + (m || !h ? m + '分' : '');
}
// ISO → "MM/DD HH:MM"
function krFmtClock(iso){
  if(!iso) return '—';
  const d = new Date(iso); if(isNaN(d)) return '—';
  const z = n => String(n).padStart(2,'0');
  return `${z(d.getMonth()+1)}/${z(d.getDate())} ${z(d.getHours())}:${z(d.getMinutes())}`;
}

// サマリー本体を組み立て
function buildSummary(){
  const body = document.getElementById('k2-summary-body');
  // 計測値セル（行ごと）から、時刻付きの記録を収集
  const recs = [];
  document.querySelectorAll('#k2-daily-body input[data-col="3"]').forEach(inp => {
    const ts = inp.dataset.ts || '';
    const val = (inp.value || '').trim();
    if(!ts || !val) return;
    const tr  = inp.closest('tr');
    const lot   = tr?.querySelector('input[data-col="1"]')?.value?.trim() || '';
    const kakou = parseInt(tr?.querySelector('input[data-col="4"]')?.value?.trim() || '', 10);
    recs.push({ ts, ms: new Date(ts).getTime(), lot, val, kakou: isNaN(kakou) ? null : kakou });
  });
  recs.sort((a,b) => a.ms - b.ms);

  if(recs.length === 0){
    body.innerHTML = '<h2>所要時間サマリー</h2>'
      + '<div class="kr-sum-empty">まだ計測値の入力時刻が記録されていません。<br>'
      + '記録ページで計測値を入力すると、自動でここに反映されます。</div>';
    return;
  }

  const startMs = recs[0].ms;
  const doneMs  = _kanryoAt ? new Date(_kanryoAt).getTime() : null;
  const endMs   = doneMs || recs[recs.length-1].ms;
  const totalMin = krWorkMinutes(startMs, endMs);
  const totalKakou = recs.reduce((s, r) => s + (r.kakou ?? 0), 0);
  const avgPerMin  = (totalMin > 0 && totalKakou > 0)
    ? Math.round(totalKakou / totalMin * 10) / 10 : null;

  // 準備時間：初品計測より前に完了した直近タスクの kanryo_at → 初品計測
  let prepMin = null;
  let prevKanryoAt = null;
  const prevRec = _allRecords
    .filter(r => r.kanryo_at && String(r.meisai_no) !== String(_meta.no))
    .map(r => ({...r, _ms: new Date(r.kanryo_at).getTime()}))
    .filter(r => !isNaN(r._ms) && r._ms < startMs)
    .sort((a, b) => b._ms - a._ms)[0];
  if(prevRec) {
    prevKanryoAt = prevRec.kanryo_at;
    prepMin = krWorkMinutes(new Date(prevKanryoAt).getTime(), startMs);
  }

  // カード
  let html = '<h2>所要時間サマリー</h2>'
    + '<div class="kr-sum-sub">最初の計測値入力〜完了までの実工数（稼働時間・休憩を除外）</div>'
    + '<div class="kr-sum-cards">'
    + (prevKanryoAt ? `<div class="kr-sum-card"><div class="lbl">前タスク完了</div><div class="val">${krFmtClock(prevKanryoAt)}</div></div>` : '')
    + (prepMin != null ? `<div class="kr-sum-card"><div class="lbl">準備時間</div><div class="val big">${krFmtDur(prepMin)}</div></div>` : '<div class="kr-sum-card"><div class="lbl">準備時間</div><div class="val" style="color:#666">前タスク未完了</div></div>')
    + `<div class="kr-sum-card"><div class="lbl">開始（初品計測）</div><div class="val">${krFmtClock(recs[0].ts)}</div></div>`
    + `<div class="kr-sum-card"><div class="lbl">${doneMs ? '完了' : '最終計測（未完了）'}</div><div class="val">${krFmtClock(doneMs ? _kanryoAt : recs[recs.length-1].ts)}</div></div>`
    + `<div class="kr-sum-card"><div class="lbl">実所要時間</div><div
