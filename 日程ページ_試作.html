<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日程ページ 試作 — 切断加工日程表</title>
<style>
  :root{
    --bg:#1c1c1c; --panel:#222; --line:#333; --ink:#e8e8e8; --sub:#888;
    --head:#161616; --headtxt:#fff;     --proc2:#7a8490; --proc1:#7ba7d9;
    --mat:#f3d518; --deliv:#2e9e5b; --due:#d23b3b;
    --accent:#d97757; --accent-hi:#e89070;   /* Claudeオレンジ */
    --bar-h:14px; --bar-top:8px;
    --row-h:30px; --left-w:881px; --cell-w:30px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;font-family:"游ゴシック","Yu Gothic",sans-serif;background:var(--bg);color:var(--ink);}
  header{background:var(--head);color:var(--headtxt);padding:5px 12px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;border-bottom:1px solid #2a2a2a;}
  header h1{font-size:19px;margin:0;font-weight:600;}
  header .sub{font-size:13px;opacity:.6;}
  @keyframes deliv-blink{ 0%,100%{opacity:1;} 50%{opacity:.25;} }
  header .btns{margin-left:auto;display:flex;gap:8px;flex-wrap:nowrap;flex-shrink:0;}
  header button{border:1px solid #3a3a3a;border-radius:6px;padding:7px 14px;font-size:14px;cursor:pointer;background:#2a2a2a;color:#e8e8e8;font-weight:600;}
  header button:hover{background:#333;border-color:#555;}
  header button.primary{background:#e86a00;color:#fff;font-weight:700;border-color:#e86a00;}
  header button.primary:hover{background:#ff8020;}
  .legend{display:flex;gap:14px;font-size:13px;color:var(--sub);padding:6px 16px;background:#1a1a1a;border-bottom:1px solid var(--line);flex-wrap:wrap;align-items:center;}
  .legend i{display:inline-block;width:14px;height:14px;border-radius:3px;vertical-align:-2px;margin-right:4px;}
  /* シミュレーショントグル */
  .sim-area{display:flex;align-items:center;gap:10px;padding-left:4px;border-left:1px solid #333;margin-left:2px;}
  .sim-sw{display:inline-flex;align-items:center;gap:5px;cursor:pointer;font-size:12px;color:var(--sub);user-select:none;white-space:nowrap;}
  .sim-sw input[type=checkbox]{display:none;}
  .sim-track{width:30px;height:16px;background:#2a2a2a;border-radius:8px;position:relative;transition:background .2s;border:1px solid #444;flex-shrink:0;}
  .sim-sw input:checked + .sim-track{background:#4a9eff;border-color:#4a9eff;}
  .sim-thumb{width:12px;height:12px;background:#555;border-radius:6px;position:absolute;top:1px;left:1px;transition:left .18s,background .18s;}
  .sim-sw input:checked + .sim-track .sim-thumb{left:15px;background:#fff;}
  .sim-sw input:checked ~ .sim-lbl{color:#4a9eff;font-weight:600;}
  .wrap{overflow-x:scroll;overflow-y:auto;position:relative;height:calc(100% - 96px);}
  .wrap.no-select{user-select:none;}
  table.gantt{border-collapse:separate;border-spacing:0;min-width:max-content;}
  thead th{position:sticky;background:var(--head);color:var(--headtxt);font-weight:600;white-space:nowrap;}
  thead tr.r1 th{top:0;z-index:10;font-size:13px;border-right:1px solid #2a2a2a;border-bottom:1px solid #2a2a2a;padding:3px 0;height:24px;}
  thead tr.r2 th{top:24px;z-index:10;font-size:11px;font-weight:400;opacity:.7;border-right:1px solid #2a2a2a;border-bottom:1px solid #2a2a2a;padding:2px 0;min-width:var(--cell-w);width:var(--cell-w);height:16px;}
  thead th.corner{position:sticky;left:0;top:0;z-index:11;text-align:left;padding:0;min-width:var(--left-w);background:#161616;}
  /* テーブルセルstickyのz-indexバグ回避: コーナーは通常divとして上から被せる */
  #corner-front{position:sticky;top:0;left:0;z-index:9999;width:var(--left-w);height:40px;background:#161616;overflow:hidden;margin-bottom:-40px;pointer-events:none;}
  #corner-front .hdr-left{height:40px;pointer-events:all;}
  .hdr-left{display:flex;align-items:center;height:100%;gap:0;overflow:hidden;}
  .grip-ph{flex:0 0 auto;min-width:28px;border-right:1px solid #2a2a2a;}
  .fld.hdr{color:rgba(255,255,255,.7);background:transparent !important;font-size:12px;font-weight:600;cursor:default;pointer-events:none;}
  thead th.day small{font-weight:400;opacity:.7;}
  td.left{position:sticky;left:0;z-index:12;background:var(--panel);border-right:2px solid var(--line);border-bottom:1px solid var(--line);min-width:var(--left-w);max-width:var(--left-w);padding:0;}
  .leftinner{display:flex;align-items:stretch;gap:0;height:var(--row-h);overflow:hidden;}
  .grip{cursor:grab;color:#555;font-size:16px;padding:0 4px;user-select:none;touch-action:none;flex:0 0 auto;display:flex;align-items:center;border-right:1px solid #333;}
  .grip:active{cursor:grabbing;}
  .fld{flex:0 0 auto;display:flex;flex-direction:column;justify-content:center;padding:2px 6px;font-size:14px;line-height:1.25;border-right:1px solid #333;overflow:hidden;}
  .fld.kyukyu{flex:0 0 42px;text-align:right;color:#e8e8e8;font-size:11px;}
  .fld.shohi{flex:0 0 42px;text-align:right;color:#e8e8e8;font-size:11px;}
  .fld.zansu{flex:0 0 42px;text-align:right;font-weight:700;color:#e8e8e8;font-size:11px;}
  .fld.no{flex:0 0 70px;color:var(--sub);font-weight:600;}
  .fld.nm{flex:0 0 242px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;position:relative;}
  #show-hidden-btn{position:absolute;right:3px;top:50%;transform:translateY(-50%);font-size:10px;padding:1px 5px;background:#2a2a2a;color:#aaa;border:1px solid #444;border-radius:4px;cursor:pointer;font-weight:600;white-space:nowrap;pointer-events:all;}
  #show-hidden-btn:hover{background:#3a3a3a;color:#fff;}
  #show-hidden-btn.active{background:#1a3020;color:#4ec97a;border-color:#3a7a50;}
  .fld.nm:hover{overflow:visible;z-index:20;}
  .fld.nm:hover .nmtxt{position:absolute;left:0;top:50%;transform:translateY(-50%);background:var(--panel);border:1px solid #444;border-radius:4px;padding:2px 8px;white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.6);}
  .fld.nm.nm-pcin{background:#9dc183;color:#000;}
  .fld.nm.nm-pcin:hover .nmtxt{color:#fff;}
  .fld.qty{flex:0 0 54px;text-align:right;cursor:pointer;font-size:16px;}
  .fld.qty:hover{filter:brightness(1.3);}
  .fld.qty .phour{font-size:11px;color:var(--sub);}
  .fld.mod-qty{background:#332800 !important;}
  .dchip.due.mod-af{background:#2d0040 !important;color:#cc88ff !important;}
  .fld.done{flex:0 0 48px;text-align:right;cursor:pointer;font-weight:700;font-size:16px;}
  .fld.done small{font-size:11px;color:var(--sub);font-weight:400;}
  .fld.done.full{background:#003a1a;}
  .fld.hrs{flex:0 0 77px;flex-direction:row;align-items:center;gap:3px;}
  .fld.hrs b{font-size:14px;}
  .fld.hrs .cum{font-size:11px;color:var(--proc1);}
  .dchip{cursor:pointer;text-align:center;flex:0 0 54px;}
  .dchip:hover{filter:brightness(1.4);}
  .dchip.mat{background:#2a2500;color:#f3d518;}
  .dchip.deliv{background:#002a15;color:#2e9e5b;}
  .dchip.due{background:#2a0000;color:#d23b3b;}
  td.cell{min-width:var(--cell-w);width:var(--cell-w);height:var(--row-h);border-bottom:1px solid var(--line);border-right:1px solid var(--line);padding:0;position:relative;z-index:0;}
  td.cell.half{border-right:1px solid #2a2a2a;}
  td.cell.dayend{border-right:2px solid #444;}
  .bar{position:absolute;top:var(--bar-top);height:var(--bar-h);border-radius:3px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;overflow:hidden;z-index:3;}
  .mark{position:absolute;top:var(--bar-top);height:var(--bar-h);border-radius:3px;opacity:.85;z-index:3;}
  .mark.mat{background:var(--mat);}
  .mark.deliv{background:var(--deliv);}
  .mark.due{background:var(--due);}
  tr.dragging td{opacity:.4;}
  tr.row:hover td.left{background:#382d23;}
  tr.row:hover td.cell{background:rgba(255,140,40,0.10);}
  thead th.day:hover{background:rgba(255,140,40,0.15) !important;}
  tr.row.mv-pick td.left{background:#254532 !important;box-shadow:inset 3px 0 0 var(--proc1,#3fb37a);}
  tr.row.mv-pick td.cell{background:rgba(46,158,91,0.10);}
  tr.row.mv-pick .grip{color:#3fb37a;}
  /* 加工中（1〜99%、または直前が100%で自分が0%の着手行） */
  tr.row.in-progress td.left{background:#283341 !important;box-shadow:inset 3px 0 0 #4a9eff;}
  tr.row.in-progress td.cell{background:rgba(74,158,255,0.07);}
  /* 並行タスク */
  tr.row.parallel-row td.left{box-shadow:inset 3px 0 0 #5abf80;}
  .parallel-mark{font-size:10px;color:#5abf80;margin-left:3px;vertical-align:1px;cursor:default;}
  #parallel-ctx-menu{position:fixed;background:#1e1e1e;border:1px solid #444;border-radius:6px;padding:4px 0;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.6);font-size:13px;min-width:150px;max-height:360px;overflow-y:auto;}
  #parallel-ctx-menu .ctx-title{padding:5px 12px 3px;color:#666;font-size:11px;pointer-events:none;}
  #parallel-ctx-menu .ctx-item{padding:6px 12px;cursor:pointer;color:#e8e8e8;white-space:nowrap;}
  #parallel-ctx-menu .ctx-item:hover{background:#2a2a2a;}
  #parallel-ctx-menu .ctx-item.ctx-active{color:#5abf80;background:#1a2a1a;}
  #parallel-ctx-menu .ctx-sep{border-top:1px solid #333;margin:4px 0;}
  #parallel-ctx-menu .ctx-clear{padding:6px 12px;cursor:pointer;color:#e07060;}
  #parallel-ctx-menu .ctx-clear:hover{background:#2a2a2a;}
  /* 納品マーカーと進捗バーが重なっている＝納品遅延の恐れ → ほんのり赤くハイライト */
  tr.row.deliv-risk td.left{background:#3b2626 !important;}
  tr.row.deliv-risk td.cell{background:rgba(210,59,59,0.10);}
  /* 納品日当日まで作業が続く → ほんのり黄色ハイライト */
  tr.row.samedaywork-risk td.left{background:#2e2a10 !important;}
  tr.row.samedaywork-risk td.cell{background:rgba(240,192,64,0.10);}
  /* 納品日ハイライト（日付フィルター）— risk系より後ろで !important → 必ず上書き */
  tr.row.deliv-match td.left{background:#1a3020 !important;box-shadow:inset 3px 0 0 #2e9e5b;}
  tr.row.deliv-match td.cell{background:rgba(46,158,91,0.18);}
  /* 行選択 — 最優先 */
  tr.row.selected td.left{background:#1a2d45 !important;}
  tr.row.selected td.cell{background:rgba(80,140,220,0.10);}
  thead th.day.col-hl{background:rgba(255,140,40,0.20) !important;}
  td.cell.col-hl{background:rgba(255,140,40,0.10);}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:50;}
  .modal.on{display:flex;}
  .pad{background:#222;border-radius:14px;padding:16px;width:280px;box-shadow:0 12px 40px rgba(0,0,0,.6);border:1px solid #3a3a3a;}
  .pad .ttl{font-size:13px;color:var(--sub);margin-bottom:2px;}
  .pad .nm2{font-size:14px;font-weight:600;margin-bottom:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink);}
  .pad .disp{font-size:30px;font-weight:700;text-align:right;background:#1c1c1c;border-radius:8px;padding:8px 14px;margin-bottom:4px;color:var(--ink);}
  .pad input.dinput{font-size:24px;font-weight:700;text-align:center;width:100%;border:2px solid var(--line);border-radius:8px;padding:8px;margin-bottom:6px;background:#1c1c1c;color:var(--ink);}
  .pad .max{font-size:11px;color:var(--sub);text-align:right;margin-bottom:12px;}
  .keys{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  .keys button{font-size:20px;padding:14px 0;border:1px solid #3a3a3a;background:#2a2a2a;border-radius:8px;cursor:pointer;color:var(--ink);}
  .keys button:active{background:#3a3a3a;}
  .padfoot{display:flex;gap:8px;margin-top:12px;}
  .padfoot button{flex:1;padding:12px;border:0;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;}
  .padfoot .cancel{background:#333;color:#e8e8e8;}
  .padfoot .ok{background:#2e9e5b;color:#fff;}

  .fld.editing{padding:0 !important;overflow:visible !important;}
  .fld.editing input{width:100%;height:100%;border:2px solid #4a9eff;border-radius:0;background:#1a2a3a;color:#fff;font-size:14px;font-weight:700;text-align:center;padding:0 4px;outline:none;box-sizing:border-box;}
  .fld.selected-cell{outline:2px solid #4a9eff;outline-offset:-2px;background:#1a2a3a !important;}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;opacity:0;transition:.3s;z-index:60;border:1px solid #444;}
  .toast.on{opacity:1;}

  /* ── 削除ボタン ── */
  .del-btn{cursor:pointer;color:#555;font-size:12px;padding:0;flex:0 0 20px;display:flex;align-items:center;justify-content:center;border:none;border-right:1px solid #333;background:transparent;transition:color .15s;}
  .del-btn:hover{color:#d23b3b;}
  .del-ph{flex:0 0 20px;border-right:1px solid #2a2a2a;}
  /* ── 確認モーダル ── */
  .confirm-modal{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;z-index:60;}
  .confirm-modal.on{display:flex;}
  .confirm-pad{background:#222;border-radius:12px;padding:20px;width:300px;box-shadow:0 12px 40px rgba(0,0,0,.7);border:1px solid #3a3a3a;}
  .confirm-pad .ctitle{font-size:13px;color:var(--sub);margin-bottom:6px;}
  .confirm-pad .citem{font-size:15px;font-weight:600;margin-bottom:16px;color:var(--ink);word-break:break-all;}
  .confirm-btns{display:flex;gap:8px;}
  .confirm-btns button{flex:1;padding:12px;border:0;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;}
  .confirm-yes{background:#d23b3b;color:#fff;}
  .confirm-yes:hover{background:#e04040;}
  .confirm-no{background:#333;color:#e8e8e8;}
  .confirm-no:hover{background:#444;}

  /* ── スクロールバー ── */
  ::-webkit-scrollbar              { width: 17px; height: 17px; }
  ::-webkit-scrollbar-track        { background: #1C1C1C; }
  ::-webkit-scrollbar-thumb        { background: var(--accent); border-radius: 6px; border: 2px solid #1C1C1C; }
  ::-webkit-scrollbar-thumb:hover  { background: var(--accent-hi); }
  ::-webkit-scrollbar-corner       { background: #1C1C1C; }
  /* Firefox */
  .wrap,.kr-scroll,.kr-center,html,body{scrollbar-width:auto;scrollbar-color:var(--accent) #1C1C1C;}

  /* ══ 加工記録モーダル v2 ══ */
  /* オーバーレイ・ウィンドウ */
  .kiroku-overlay{position:fixed;inset:0;background:rgba(0,0,0,.80);display:none;align-items:center;justify-content:center;z-index:99999;}
  .kiroku-overlay.on{display:flex;}
  .kiroku-pad2{background:#1c1c1c;border-radius:10px;width:min(99vw,1200px);max-height:96vh;display:flex;flex-direction:column;border:1px solid #333;box-shadow:0 24px 64px rgba(0,0,0,.9);overflow:hidden;}
  /* ヘッダーバー */
  .kr-head{background:#161616;padding:8px 14px;border-bottom:2px solid #2a2a2a;display:flex;align-items:center;gap:10px;flex-shrink:0;}
  .kr-head .kr-title{font-size:15px;font-weight:700;color:#e8e8e8;}
  .kr-head .kr-badge{font-size:12px;color:#888;background:#222;padding:2px 10px;border-radius:4px;white-space:nowrap;border:1px solid #333;}
  .kr-head .kr-nm{font-size:13px;color:#ccc;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .kr-head .kr-close{background:none;border:none;color:#666;font-size:22px;cursor:pointer;padding:0 4px;line-height:1;}
  .kr-head .kr-close:hover{color:#e8e8e8;}
  /* スクロールラッパー */
  .kr-scroll{overflow-y:auto;flex:1;min-height:0;}
  /* ── サマリー行 ── */
  .kr-sum{width:100%;border-collapse:collapse;font-size:12px;border-bottom:2px solid #2a2a2a;}
  .kr-sum th,.kr-sum td{border:1px solid #2a2a2a;padding:4px 6px;text-align:center;white-space:nowrap;}
  .kr-sum th{background:#161616;color:#888;font-weight:600;font-size:11px;}
  .kr-sum td{background:#1c1c1c;color:#e8e8e8;}
  .kr-sum td.av{color:#7ba7d9;font-weight:700;}   /* 自動計算値は水色 */
  .kr-sum td.nm-td{text-align:left;min-width:140px;font-weight:600;overflow:hidden;text-overflow:ellipsis;max-width:220px;}
  .kr-sum input{background:transparent;border:none;color:#e8e8e8;font-size:12px;width:56px;text-align:center;outline:none;padding:2px;}
  .kr-sum input:focus{background:#1a2030;border-radius:3px;}
  /* ── 3カラムボディ ── */
  .kr-body{display:flex;align-items:stretch;min-height:220px;}
  /* 左パネル（品目スペック） */
  .kr-left{flex:0 0 188px;border-right:2px solid #2a2a2a;overflow:hidden;}
  .kr-spec{width:100%;border-collapse:collapse;font-size:12px;}
  .kr-spec th,.kr-spec td{border:1px solid #222;padding:4px 5px;text-align:center;}
  .kr-spec th{background:#161616;color:#888;font-size:11px;font-weight:600;}
  .kr-spec td{background:#1c1c1c;color:#7ba7d9;}      /* DB値は水色で既存テーマと統一 */
  .kr-spec td.lbl{background:#161616;color:#888;font-size:11px;font-weight:600;}
  .kr-spec td.txt{text-align:left;color:#888;font-size:11px;padding:3px 5px;background:#161616;}
  .kr-spec select{background:#1c1c1c;border:none;color:#e8e8e8;font-size:12px;width:100%;outline:none;padding:2px;}
  /* 中央パネル（作業明細） */
  .kr-center{flex:1;min-width:0;display:flex;flex-direction:column;overflow-x:auto;}
  .kr-work{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed;}
  .kr-work th{background:#161616;color:#888;border:1px solid #4a4a4a;padding:5px 3px;text-align:center;white-space:nowrap;font-weight:600;}
  .kr-work td{border:1px solid #4a4a4a;padding:2px 2px;vertical-align:middle;background:#1c1c1c;}
  .kr-work input{background:transparent;border:none;color:#e8e8e8;font-size:13px;width:100%;text-align:center;padding:4px 2px;outline:none;}
  .kr-work input:focus{background:#1a2030;}
  .kr-work input.kr-draft{color:#5a5a5a !important;}  /* 計測ロット下書き：薄暗い色（確定で通常色に戻る） */
  .kr-work td.ac{background:#1c1c1c;color:#7ba7d9;text-align:center;font-size:11px;padding:4px 2px;}  /* 自動計算列（緑ハイライトは廃止・青文字で区別） */
  .kr-work .dr{background:none;border:none;color:#444;cursor:pointer;font-size:15px;line-height:1;padding:0 3px;}
  .kr-work .dr:hover{color:var(--due);}
  .kr-add{margin:4px 8px;background:#222;border:1px solid #333;border-radius:5px;padding:4px 12px;color:#888;cursor:pointer;font-size:12px;display:inline-block;}
  .kr-add:hover{background:#2a2a2a;color:#e8e8e8;}
  /* 右パネル（Lot・箱数・不良） */
  .kr-right{flex:0 0 150px;border-left:2px solid #2a2a2a;display:flex;flex-direction:column;}
  .kr-lot{width:100%;border-collapse:collapse;font-size:12px;}
  .kr-lot th,.kr-lot td{border:1px solid #222;padding:4px 4px;text-align:center;}
  .kr-lot th{background:#161616;color:#888;font-weight:600;font-size:11px;}
  .kr-lot td{background:#1c1c1c;}
  .kr-lot input{background:transparent;border:none;color:#e8e8e8;font-size:13px;width:100%;text-align:center;outline:none;padding:3px 2px;}
  .kr-lot input:focus{background:#1a2030;}
  .kr-fry{width:100%;border-collapse:collapse;font-size:12px;flex:1;}
  .kr-fry th{background:#161616;color:#888;border:1px solid #222;padding:4px;font-weight:600;font-size:11px;}
  .kr-fry td{border:1px solid #222;padding:3px 4px;background:#1c1c1c;}
  .kr-fry td.fl{background:#161616;color:#888;font-size:11px;text-align:right;padding:3px 7px;}
  .kr-fry input{background:transparent;border:none;color:#e8e8e8;font-size:13px;width:100%;text-align:center;outline:none;padding:2px;}
  .kr-fry input:focus{background:#1a2030;}
  .kr-fry tr.tot td{background:#200a0a;}
  .kr-fry tr.tot input{color:var(--due);font-weight:700;}

// ── シミュレーションオフセット ──
// 午後（12時以降）は自動で+4hからスタート。トグルで手動切替も可
let sim4 = (new Date().getHours() >= 12);  // 午後は自動ON
let sim8 = false;
// BAR_OFFSET（バー位置）
function getSimOffset(){ return sim8 ? 8 : (sim4 ? HRS_PER_SLOT : 0); }
// COL_OFFSET（列ラベル）：+4h=午後モード(0)、+8h/なし=午前モード(4)
function getColOffset(){
  if(sim8) return 4;
  if(sim4) return 0;
  return (new Date().getHours() < 12) ? 4 : 0;
}
function onSim4Change(v){
  const isAfternoon=(new Date().getHours()>=12);
  sim4=!!v;
  // 午後は+8がOFFの間は+4を強制ON
  if(isAfternoon && !sim8) sim4=true;
  if(sim4) sim8=false;
  syncSimUI(); buildHead(); buildBody();
}
function onSim8Change(v){
  const isAfternoon=(new Date().getHours()>=12);
  sim8=!!v;
  if(sim8) sim4=false;
  else if(isAfternoon) sim4=true; // +8をOFFにしたら午後は+4を自動復帰
  syncSimUI(); buildHead(); buildBody();
}
function syncSimUI(){
  const c4=document.getElementById('sim4-chk');
  const c8=document.getElementById('sim8-chk');
  if(c4) c4.checked=sim4;
  if(c8) c8.checked=sim8;
}

// 品名(空白除去)→品目スペック。app.py が vfdb.json から差し込む（未注入時は空）
const VFDB_SPEC = {};

function pct(r){return r.qty?Math.round(r.done/r.qty*100):0;}

// 自動非表示判定：進捗100% かつ 納品日(ad)が今日より前
let showHidden = false;
function isAutoHide(r){
  if(!r.qty || r.done < r.qty) return false;  // 進捗100%未満はスキップしない
  const ad = r.ad; if(!ad) return false;
  const today = new Date();
  const [m,d] = ad.split('/').map(Number);
  const adDate = new Date(today.getFullYear(), m-1, d);
  const todayDate = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  return adDate < todayDate;  // 納品日が今日より前（超過）
}

function buildBody(){
  const tb=document.getElementById('body');tb.innerHTML="";
  const BAR_OFFSET=getSimOffset(); // バー表示位置（シミュトグル連動）
  let cumH=0; // 累計工数は常に0から（表示される「累X.Xh」の基準）
  let delivRiskCount=0; // 納品マーカーと進捗バーが重なっている件数
  let prevZansu=null; // 8FL281304行の残数累積
  rows.forEach((r,idx)=>{
    if(!showHidden && isAutoHide(r)) return;  // 自動非表示
    const p=pct(r);
    const orig=original.find(o=>o.no===r.no);
    const qtyMod=orig&&r.qty!==orig.qty;
    const afMod=orig&&r.af!==orig.af;
    const pct100=(r.qty>0&&r.done>=r.qty); // 完了フラグ
    const remaining=pct100 ? 0 : (r.qty>0 ? r.hours*(r.qty-r.done)/r.qty : r.hours); // 残工数（完了は0）
    // 並行タスク：parallelFromが設定されている場合は日付から開始位置を計算
    let startH, endH;
    if(r.parallelFrom){
      const _pi=days.findIndex(d=>d[0]===r.parallelFrom);
      startH=(_pi>=0)?(_pi*8-BAR_OFFSET):cumH;
      endH=startH+remaining;
      cumH=endH; // 速めた行の終わりから後続を直列で積み直す（アンカー＆再連結）
    }else{
      startH=cumH;
      cumH+=remaining;
      endH=cumH;
    }
    const prevDone=(idx>0&&pct(rows[idx-1])>=100);
    const isInProgress=(p>=1&&p<100)||(p===0&&prevDone);
    const tr=document.createElement('tr');tr.className="row"+(isInProgress?' in-progress':'')+(r.parallelFrom?' parallel-row':'');tr.dataset.idx=idx;
    let cells=`<td class="left"><div class="leftinner">
      <span class="grip" data-grip>⋮⋮</span>
      <button class="del-btn" onclick="askDelete(${idx});event.stopPropagation();" title="削除">×</button>
      <span class="fld kyukyu" data-edit="kyukyu" data-idx="${idx}" tabindex="0">${r.kyukyu||0}</span>
      ${(()=>{
        // SGT同期済みの値があればそれを優先、なければVFDB_SPECから計算
        // shohi: 手動設定(r.shohi)があれば優先、なければVFDB_SPECから計算
        const is8FL=String(r.nm||'').startsWith('8FL281304');
        let shohi=0;
        if(r.shohi != null){
          shohi = r.shohi;
        } else if(is8FL){
          const sp=VFDB_SPEC&&VFDB_SPEC[_normNmP(r.nm)];
          const toru=sp&&sp.toru;
          shohi=(toru>0)?Math.ceil(r.qty/toru):0;
        }
        // zansu は常にリアルタイム計算（kyukyu変更を即反映）
        const zansu=(prevZansu!=null?prevZansu:0)+(r.kyukyu||0)-shohi;
        prevZansu=zansu;
        // 8FL以外は消費列を表示しない
        const shohi_disp=is8FL?shohi:0;
        return `<span class="fld shohi">${shohi_disp}</span><span class="fld zansu">${zansu}</span>`;
      })()}
      <span class="fld no kiroku-trigger" onclick="openKiroku(${idx});event.stopPropagation();">${String(r.no).replace(/^0+/,'')}</span>
      <span class="fld nm${r.nm&&r.nm.includes('PC IN')?' nm-pcin':''}"><span class="nmtxt">${r.nm}</span></span>
      <span class="fld qty${qtyMod?' mod-qty':''}" data-edit="qty" data-idx="${idx}" tabindex="0">${r.qty}<span class="phour">${(()=>{
        // 残工数(h) = (注文数 - 進捗数) ÷ DB切断工数(本/h)
        // DBはVFDB_SPEC(vfdb.json)から取得、依頼書データは参照しない
        const _sp=VFDB_SPEC&&VFDB_SPEC[_normNmP(r.nm)];
        const _ks=_sp?parseFloat(_sp.kosuu||0):0;
        const _rem=r.qty-r.done;
        return(_ks>0&&_rem>0)?(_rem/_ks).toFixed(1)+'h':'';
      })()}</span></span>
      <span class="fld done ${p>=100?'full':''}" data-edit="done" data-idx="${idx}" tabindex="0">${r.done}<small> ${p}%</small></span>
      <span class="fld hrs"><b>${remaining.toFixed(1)}</b><span class="cum">/${endH.toFixed(1)}</span>${r.parallelFrom?`<span class="parallel-mark" title="並行: ${r.parallelFrom}">⤺</span>`:''}</span>
      <span class="fld dchip mat" data-edit="ac" data-idx="${idx}" tabindex="0">${r.ac||"—"}</span>
      <span class="fld dchip deliv" data-edit="ad" data-idx="${idx}" tabindex="0">${r.ad||"—"}</span>
      <span class="fld denno" title="伝票No">${r.denno||"—"}</span>
      <span class="fld dchip due${afMod?' mod-af':''}" data-edit="af" data-idx="${idx}" tabindex="0">${r.af||"—"}</span>
    </div></td>`;
    for(let s=0;s<SLOTS;s++){
      const de=(s%2===1)?' dayend':' half';
            cells+=`<td class="cell${de}" data-s="${s}"></td>`;
    }
    tr.innerHTML=cells;tb.appendChild(tr);
    const fc=tr.querySelectorAll('td.cell')[0];
    // 工程バー：累計工数から自動連結（1h = CW/4 px）。進捗100%は非表示
    if(!pct100){
      const pxPerH=CW/HRS_PER_SLOT;
      const bar=document.createElement('div');bar.className="bar";
      bar.style.left=((startH+BAR_OFFSET)*pxPerH+1)+"px";
      bar.style.width=Math.max(remaining*pxPerH-2,4)+"px";
      bar.style.background=r.nm.includes('灯具')?"var(--proc1)":"var(--proc2)"; // 灯具=一人(水色)、それ以外=二人(グレー)
      fc.appendChild(bar);
    }
    // マーカー：文字なし・バーと同高
    const addMark=(mmdd,cls,half)=>{
      const s=dateToSlot(mmdd,half);if(s==null)return;
      const m=document.createElement('div');m.className="mark "+cls;
      m.style.left=(s*CW+1)+"px";m.style.width=(CW-2)+"px";fc.appendChild(m);
    };
    // 引取(AC)は単独
    addMark(r.ac,"mat",1);
    // 納品(AD)と期限(AF)が同じスロット（午後=half:1）に重なる場合は左半分緑・右半分赤
    const sAd=dateToSlot(r.ad,1);
    const sAf=dateToSlot(r.af,1);
    if(sAd!=null && sAf!=null && sAd===sAf){
      // 左半分: 納品(緑)
      const mL=document.createElement('div');mL.className="mark deliv";
      mL.style.left=(sAd*CW+1)+"px";mL.style.width=Math.floor((CW-2)/2)+"px";fc.appendChild(mL);
      // 右半分: 期限(赤)
      const half=Math.floor((CW-2)/2);
      const mR=document.createElement('div');mR.className="mark due";
      mR.style.left=(sAd*CW+1+half)+"px";mR.style.width=(CW-2-half)+"px";fc.appendChild(mR);
    } else {
      addMark(r.ad,"deliv",1);
      addMark(r.af,"due",1); // 期限も午後列に統一
    } // 引取・納品=午後(PM), 期限=午前

    // 納品マーカーと進捗バーの重なり判定（＝納品遅延の恐れ）
    if(!pct100 && sAd!=null){
      const pxPerH=CW/HRS_PER_SLOT;
      const barLeft=(startH+BAR_OFFSET)*pxPerH+1;
      const barRight=barLeft+Math.max(remaining*pxPerH-2,4);
      const markLeft=sAd*CW+1;
      const markWidth=(sAd===sAf)?Math.floor((CW-2)/2):(CW-2);
      const markRight=markLeft+markWidth;
      if(barLeft<markRight && markLeft<barRight){
        tr.classList.add('deliv-risk');
        tr.classList.add('samedaywork-risk');
        delivRiskCount++;
      }
    }

    // 行クリック（グリップのみ除外、ハイライトはhoverのみ）
    tr.addEventListener('click',e=>{
      if(e.target.closest('[data-grip]'))return;
    });
  });
  attachDrag();
  attachContextMenu();
  applySelection();
  applyPicks();
  applyDelivFilter();
  attachColHover();
  const warnEl=document.getElementById('deliv-warn');
  if(warnEl){
    if(delivRiskCount>0){
      warnEl.textContent='⚠ 納品遅延の恐れがある依頼が'+delivRiskCount+'件あります。';
      warnEl.style.display='';
    } else {
      warnEl.textContent='';
      warnEl.style.display='none';
    }
  }
  const sameDayEl=document.getElementById('samedaywork-warn');
  if(sameDayEl){
    if(delivRiskCount>0){
      sameDayEl.textContent='⚠ 納品日当日まで作業が続く依頼があります。';
      sameDayEl.style.display='';
    } else {
      sameDayEl.textContent='';
      sameDayEl.style.display='none';
    }
  }
}

// 作業日：日だけ入力したら月を自動補完（例 1 → 06/01）。月はPCのカレンダー（システム日付）から取得
function schedMonth(){
  return new Date().getMonth()+1;
}
function normalizeWorkDate(el){
  const v=(el.value||'').trim();
  if(!v)return;
  let mm,dd,m;
  if(/^\d{1,2}$/.test(v)){ mm=schedMonth(); dd=+v; }                       // 日だけ→当月補完
  else if((m=/^(\d{1,2})\s*[\/\-.]\s*(\d{1,2})$/.exec(v))){ mm=+m[1]; dd=+m[2]; } // M/D→ゼロ埋め
  else return;                                                             // それ以外は触らない
  if(mm<1||mm>12||dd<1||dd>31)return;
  const out=String(mm).padStart(2,'0')+'/'+String(dd).padStart(2,'0');
  if(out!==el.value) el.value=out;
}
// 加工Lot（5行）：日だけ入力で yy.mm.dd 表記に補完（例 1 → 26.06.01）。年月はPCのカレンダーから
function normalizeLotDate(el){
  const v=(el.value||'').trim();
  if(!v)return;
  const now=new Date();
  let YY=String(now.getFullYear()%100).padStart(2,'0'), mm, dd, m;
  if(/^\d{1,2}$/.test(v)){ mm=now.getMonth()+1; dd=+v; }                                 // 日だけ→当年当月
  else if((m=/^(\d{1,2})\s*[\/\-.]\s*(\d{1,2})$/.exec(v))){ mm=+m[1]; dd=+m[2]; }          // M/D→当年
  else if((m=/^(\d{2,4})\s*[\/\-.]\s*(\d{1,2})\s*[\/\-.]\s*(\d{1,2})$/.exec(v))){ YY=String((+m[1])%100).padStart(2,'0'); mm=+m[2]; dd=+m[3]; } // Y.M.D→ゼロ埋め
  else return;                                                                            // それ以外は触らない
  if(mm<1||mm>12||dd<1||dd>31)return;
  const out=YY+'.'+String(mm).padStart(2,'0')+'.'+String(dd).padStart(2,'0');
  if(out!==el.value) el.value=out;
}
// 入庫日：加工Lot（yy.mm.dd）の中で最も遅い日付を MM/DD で表示
function updateNyukoBi(){
  const el=document.getElementById('k2-nyuko-bi'); if(!el)return;
  let best=null;
  for(let i=0;i<KR_LOT_ROWS;i++){
    const m=/^(\d{2})\.(\d{1,2})\.(\d{1,2})$/.exec((document.getElementById('k2-lot-'+i)?.value||'').trim());
    if(!m)continue;
    const ord=(+m[1])*10000+(+m[2])*100+(+m[3]);
    if(best===null||ord>best.ord) best={ord,mm:+m[2],dd:+m[3]};
  }
  if(best) el.value=String(best.mm).padStart(2,'0')+'/'+String(best.dd).padStart(2,'0');
}

// 加工Lot・箱数・不良数の移動
//  Enter：加工Lot→（右）箱数→（次段の）加工Lot…とジグザグ。不良数は下へ
//  ↑↓：各列内の縦移動
const KR_VGROUPS=[
  ['k2-lot-0','k2-lot-1','k2-lot-2','k2-lot-3','k2-lot-4'],
  ['k2-hako-0','k2-hako-1','k2-hako-2','k2-hako-3','k2-hako-4'],
  ['f2-kizu','f2-kubomi','f2-imono','f2-kake','f2-meyani','f2-peko','f2-sonota'],
];
const KR_ENTER_SEQ=(()=>{const a=[];for(let i=0;i<5;i++){a.push('k2-lot-'+i,'k2-hako-'+i);}return a;})();
document.addEventListener('keydown',e=>{
  if(e.key!=='Enter'&&e.key!=='ArrowDown'&&e.key!=='ArrowUp')return;
  const id=e.target&&e.target.id;
  if(!id)return;
  let t=null;
  if(e.key==='Enter'){
    if(KR_ENTER_SEQ.includes(id)){                       // 加工Lot⇔箱数のジグザグ
      const ni=KR_ENTER_SEQ.indexOf(id)+1; e.preventDefault();
      if(ni<KR_ENTER_SEQ.length) t=document.getElementById(KR_ENTER_SEQ[ni]);
    }else{
      const g=KR_VGROUPS.find(a=>a.includes(id)); if(!g)return;
      const ni=g.indexOf(id)+1; e.preventDefault();
      if(ni<g.length) t=document.getElementById(g[ni]);
    }
  }else{                                                 // ↑↓は縦移動
    const g=KR_VGROUPS.find(a=>a.includes(id)); if(!g)return;
    const ni=g.indexOf(id)+((e.key==='ArrowUp')?-1:1); e.preventDefault();
    if(ni>=0&&ni<g.length) t=document.getElementById(g[ni]);
  }
  if(t){t.focus();if(t.select)t.select();}
});
// 計測ロット書式：2字 [空白] 1字 [空白] 2字 [-] 残り（例 AB C DE-F）／カーソル保持
function lotFmt(raw){
  let out='';
  for(let i=0;i<raw.length;i++){
    if(i===2||i===3) out+=' ';   // 2-3文字目間／3-4文字目間にスペース
    if(i===5) out+='-';          // 5-6文字目間にハイフン
    out+=raw[i];
  }
  return out;
}
function formatKeisokuLot(el){
  const caret=el.selectionStart;
  const k=el.value.slice(0,caret).replace(/[ -]/g,'').length;   // カーソルより前の実文字数
  const raw=el.value.replace(/[ -]/g,'');
  const out=lotFmt(raw);
  if(out===el.value) return;
  el.value=out;
  const np=lotFmt(raw.slice(0,k)).length;
  try{el.setSelectionRange(np,np);}catch(_){}
}

function applyPicks(){
  const set=new Set(mvPicks);
  document.querySelectorAll('tr.row').forEach(tr=>tr.classList.toggle('mv-pick',set.has(rows[+tr.dataset.idx])));
  const sb=document.getElementById('sort-due-btn');
  if(sb){

    sb.textContent=`⇅ 期限で${mvSortDir>0?'昇順':'降順'}ソート（${mvPicks.length}行）`;
  }
}

let mvSortDir=1;   // 1=昇順 / -1=降順（押すたび反転）
function dueKey(o){const m=/^(\d{1,2})\/(\d{1,2})$/.exec((o.af||'').trim());return m?(+m[1])*100+(+m[2]):99999;}
function sortPicksByDue(){
  if(mvPicks.length<2)return;
  const slots=mvPicks.map(o=>rows.indexOf(o)).sort((a,b)=>a-b);   // 選択行の現在位置（連続）
  const sorted=mvPicks.slice().sort((a,b)=>(dueKey(a)-dueKey(b))*mvSortDir);
  slots.forEach((s,i)=>rows[s]=sorted[i]);                        // 同じ枠に並べ替えて戻す
  mvPicks=sorted;                                                 // 選択は維持
  buildBody();markDirty();
  toast(`選択${sorted.length}行を期限${mvSortDir>0?'昇順':'降順'}でソート`);
  mvSortDir*=-1;                                                  // 次回は逆向き
}
function clearPicks(){mvPicks=[];mvAnchor=null;applyPicks();}
function setRange(aIdx,bIdx){
  const lo=Math.min(aIdx,bIdx),hi=Math.max(aIdx,bIdx);
  mvPicks=rows.slice(lo,hi+1);applyPicks();
  toast(`${mvPicks.length}行を選択（グリップをドラッグで移動）`);
}

function onGripDown(e){
  e.preventDefault();
  const tr=e.target.closest('tr');
  downIdx=+tr.dataset.idx;downX=e.clientX;downY=e.clientY;
  dragging=false;lpFired=false;
  // すでに複数選択中で、その中の行を掴んだ→ブロック移動の構え
  blockDrag=mvPicks.length>1 && mvPicks.includes(rows[downIdx]);
  lpTimer=setTimeout(()=>{                 // 長押し＝範囲選択モード開始
    if(mvPicks.length===0){
      lpFired=true;mvAnchor=downIdx;mvPicks=[rows[downIdx]];applyPicks();
      toast('範囲選択：もう1行タップで範囲指定 → ドラッグで移動');
    }
  },LP_MS);
  document.addEventListener('pointermove',onGripMove);
  document.addEventListener('pointerup',onGripUp);
}

function onGripMove(e){
  if(!dragging){
    if(Math.abs(e.clientX-downX)<=MOVE_TH && Math.abs(e.clientY-downY)<=MOVE_TH) return;
    clearTimeout(lpTimer);               // 動いた＝ドラッグ確定
    dragging=true;
    if(blockDrag){
      blockObjs=mvPicks.slice();
      document.querySelectorAll('tr.row').forEach(tr=>{if(blockObjs.includes(rows[+tr.dataset.idx]))tr.classList.add('dragging');});
    }else{
      clearPicks();                      // 非選択行のドラッグは単行移動
      dragIdx=downIdx;dragEl=document.querySelector(`tr[data-idx="${dragIdx}"]`);dragEl.classList.add('dragging');
    }
  }
  if(blockDrag)onBlockDrag(e);else onSingleDrag(e);
}

function onSingleDrag(e){
  const y=e.clientY;
  for(const tr of document.querySelectorAll('tr.row')){
    if(tr===dragEl)continue;
    const rc=tr.getBoundingClientRect();
    if(y>rc.top&&y<rc.bottom){
      const o=+tr.dataset.idx;
      if(o!==dragIdx){const it=rows.splice(dragIdx,1)[0];rows.splice(o,0,it);dragIdx=o;buildBody();dragEl=document.querySelector(`tr[data-idx="${dragIdx}"]`);dragEl.classList.add('dragging');}
      break;
    }
  }
}

function onBlockDrag(e){
  const y=e.clientY;
  for(const tr of document.querySelectorAll('tr.row')){
    const i=+tr.dataset.idx;
    if(blockObjs.includes(rows[i]))continue;   // ブロック内の行は基準にしない
    const rc=tr.getBoundingClientRect();
    if(y>rc.top&&y<rc.bottom){
      const targetObj=rows[i];
      const above=y<(rc.top+rc.height/2);
      rows=rows.filter(r=>!blockObjs.includes(r));   // ブロックを抜く
      let ti=rows.indexOf(targetObj);if(!above)ti+=1;
      rows.splice(ti,0,...blockObjs);                // 元の順序のまま挿入
      buildBody();
      document.querySelectorAll('tr.row').forEach(tr=>{if(blockObjs.includes(rows[+tr.dataset.idx]))tr.classList.add('dragging');});
      break;
    }
  }
}

function onGripUp(e){
  clearTimeout(lpTimer);
  document.removeEventListener('pointermove',onGripMove);
  document.removeEventListener('pointerup',onGripUp);
  if(dragging){
    document.querySelectorAll('tr.dragging').forEach(tr=>tr.classList.remove('dragging'));
    if(blockDrag){mvPicks=blockObjs?blockObjs.slice():[];mvAnchor=null;applyPicks();}  // 移動後も選択は維持
    dragEl=null;dragIdx=null;blockObjs=null;
    markDirty();
  }else if(!lpFired && mvAnchor!=null){           // 長押し後の2点目タップ＝範囲確定
    setRange(mvAnchor,downIdx);
  }
  dragging=false;blockDrag=false;lpFired=false;downIdx=null;
}

let activeCell=null;

function getEditableCells(){
  return [...document.querySelectorAll('[data-edit]')];

function startEdit(el, prefill){
  // rebuild:false → el がデタッチされないよう遷移時はリビルドしない
  if(activeCell) commitEdit(activeCell, false);
  const idx=+el.dataset.idx;
  const field=el.dataset.edit;
  const isDate=(field==='ac'||field==='ad'||field==='af');
  const curVal=prefill!==undefined ? prefill : (isDate?(rows[idx][field]||''):(rows[idx][field]??0));

  el.classList.add('editing','selected-cell');
  const input=document.createElement('input');
  input.type=isDate?'text':'number';
  input.value=curVal;
  if(!isDate){input.min=0; if(field==='done')input.max=rows[idx].qty; if(field==='shohi')input.max=rows[idx].kyukyu||9999;}
  if(isDate)input.placeholder='MM/DD';
  el.innerHTML='';
  el.appendChild(input);
  input.focus();input.select();
  activeCell={el,idx,field,isDate};

  input.addEventListener('keydown',e=>{
    const navKeys=['Enter','Tab','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'];
    if(navKeys.includes(e.key)){
      e.preventDefault();
      // Enter on ac/ad → 確定値を下セルに引き継ぐ
      const _doCarry = e.key==='Enter' && (field==='ac'||field==='ad');
      const _carryIdx = idx, _carryField = field;
      commitEdit(activeCell, false);
      const all=getEditableCells();
      const cur=all.indexOf(el);
      const renderedRows=document.getElementById('body').querySelectorAll('tr.row').length;
      const fpr=renderedRows>0?Math.round(all.length/renderedRows):6; // fields per row
      let targetIdx=null;
      if(e.key==='Enter'||e.key==='ArrowDown')                              targetIdx=cur+fpr;
      else if(e.key==='ArrowUp')                                             targetIdx=cur-fpr;
      else if((e.key==='Tab'&&!e.shiftKey)||e.key==='ArrowRight')           targetIdx=cur+1;
      else if((e.key==='Tab'&&e.shiftKey)||e.key==='ArrowLeft')             targetIdx=cur-1;
      buildBody();
      if(targetIdx!=null&&targetIdx>=0){
        const newAll=getEditableCells();
        if(newAll[targetIdx]){
          if(_doCarry) startEdit(newAll[targetIdx], rows[_carryIdx][_carryField]||'');
          else startEdit(newAll[targetIdx]);
        }
      }
    }
    if(e.key==='Escape'){cancelEdit(activeCell);}
    e.stopPropagation();
  });
  input.addEventListener('blur',()=>{
    setTimeout(()=>{if(activeCell&&activeCell.el===el)commitEdit(activeCell);},100);
  });
}

function commitEdit(ac, rebuild=true){
  if(!ac)return;
  const {el,idx,field,isDate}=ac;
  const input=el.querySelector('input');
  if(!input){activeCell=null;return;}
  let v=input.value.trim();

  if(isDate){
    // 日数のみ入力 (1〜31) → 当月 MM/DD に自動変換（引取・納品列のみ）
    if(v && /^\d{1,2}$/.test(v) && (field==='ac'||field==='ad')){
      const _d=parseInt(v,10);
      if(_d>=1&&_d<=31){const _now=new Date();v=String(_now.getMonth()+1).padStart(2,'0')+'/'+String(_d).padStart(2,'0');}
    }
    if(v&&!/^\d{1,2}\/\d{1,2}$/.test(v)){toast('MM/DD 形式で入力（例 06/12）');cancelEdit(ac);return;}
    if(v){const[m,d]=v.split('/');v=m.padStart(2,'0')+'/'+d.padStart(2,'0');}
    if(!v && field==='af'){const orig=original.find(o=>o.no===rows[idx].no);v=orig?.af||null;}
    rows[idx][field]=v||null;
    if(field==='ad'){ rows[idx].denno=null; autoAssignDenno(true); } // 納品日変更→その行のdennoをリセットして再採番
  } else if(field==='qty'){
    let n=parseInt(v||'0',10);if(isNaN(n)||n<0)n=0;
    rows[idx].qty=n;
    if(rows[idx].done>n)rows[idx].done=n;
  } else if(field==='kyukyu'){
    let n=parseInt(v||'0',10);if(isNaN(n)||n<0)n=0;
    rows[idx].kyukyu=n;
  } else if(field==='shohi'){
    let n=parseInt(v||'0',10);if(isNaN(n)||n<0)n=0;
    rows[idx].shohi=n;
  } else {
    let n=parseInt(v||'0',10);if(isNaN(n)||n<0)n=0;if(n>rows[idx].qty)n=rows[idx].qty;
    rows[idx].done=n;
  }
  activeCell=null;
  if(rebuild){
    buildBody();
    if(field==='done'){ saveRows(); }
    else { markDirty(); toast('更新しました（保存ボタンで書き込み）'); }
  }
}

function cancelEdit(ac){
  if(!ac)return;
  activeCell=null;
  buildBody();
}

document.addEventListener('click',e=>{

// ── 伝票No 自動採番 ──
// silent=true のときは buildBody/markDirty/toast を呼ばない（commitEdit から呼ぶ時用）
function autoAssignDenno(silent=false){
  // 未採番行がなければ終了
  const unassigned=rows.filter(r=>!r.denno&&r.ad);
  if(!unassigned.length){
    if(!silent)toast('未採番の行がありません');
    return;
  }

  // 月ごとの既存 denno 最大連番を集計（納品日の月を使う）
  const monthMaxSeq={}; // { 月: maxSeq }
  rows.forEach(r=>{
    if(r.denno&&r.ad){
      const m=parseInt(r.ad.split('/')[0],10);
      const prefix=m+'-';
      if(r.denno.startsWith(prefix)){
        const n=parseInt(r.denno.split('-')[1],10);
        if(!isNaN(n))monthMaxSeq[m]=Math.max(monthMaxSeq[m]||0,n);
      }
    }
  });

  // 既存の denno 使用数を納品日ごとに集計（空きスロット把握のため）
  const adDennoCount={}; // { ad: { denno: count } }
  rows.forEach(r=>{
    if(r.denno&&r.ad){
      if(!adDennoCount[r.ad])adDennoCount[r.ad]={};
      adDennoCount[r.ad][r.denno]=(adDennoCount[r.ad][r.denno]||0)+1;
    }
  });

  // 未採番行を納品日でグループ化して日付昇順に処理
  const groups={};
  unassigned.forEach(r=>{if(!groups[r.ad])groups[r.ad]=[];groups[r.ad].push(r);});
  const sortedDates=Object.keys(groups).sort((a,b)=>{
    const[am,ad]=a.split('/').map(Number);
    const[bm,bd]=b.split('/').map(Number);
    return(am*100+ad)-(bm*100+bd);
  });

  let changed=0;
  sortedDates.forEach(date=>{
    // 納品日の月を取得してその月の prefix と連番を使う
    const m=parseInt(date.split('/')[0],10);
    const prefix=m+'-';
    if(!monthMaxSeq[m])monthMaxSeq[m]=0;

    const grp=groups[date];
    const existing=adDennoCount[date]||{};

    // 同じ納品日に既存 denno があれば空きスロット（<7件）を先に使う
    const sortedExisting=Object.keys(existing).sort((a,b)=>
      parseInt(a.split('-')[1])-parseInt(b.split('-')[1])
    );
    let curDenno=null,curCount=0;
    for(const d of sortedExisting){
      if(existing[d]<7){curDenno=d;curCount=existing[d];break;}
    }

    grp.forEach(r=>{
      if(!curDenno||curCount>=7){
        monthMaxSeq[m]++;
        curDenno=prefix+monthMaxSeq[m];
        curCount=0;
        if(!adDennoCount[date])adDennoCount[date]={};
      }
      r.denno=curDenno;
      if(!adDennoCount[date])adDennoCount[date]={};
      adDennoCount[date][curDenno]=(adDennoCount[date][curDenno]||0)+1;
      curCount++;
      changed++;
    });
  });

  if(!silent){buildBody();markDirty();toast(changed+'件に伝票Noを採番しました');}
}

function openKiroku(idx) {

  for(let pi = idx - 1; pi >= 0; pi--) {
    if(showHidden || !isAutoHide(rows[pi])) { prevNo = rows[pi].no; break; }
  }
  const meta = {no: r.no, nm: r.nm, qty: r.qty, grp: r.grp||'', ad: r.ad||'', idx: idx, prevNo};
  const params = new URLSearchParams({
    meta: JSON.stringify(meta),
    spec: JSON.stringify(spec)
  });
  const url = 'http://localhost:' + KAKOU_PORT + '/ui?' + params.toString();

  if(_kirokuWin && !_kirokuWin.closed) {
    _kirokuWin.location.href = url;
    _kirokuWin.focus();
    return;
  }
  _kirokuWin = window.open(url, 'kirokuWin', 'width=1240,height=820,resizable=yes');
  if(!_kirokuWin){ toast('ポップアップがブロックされました。ブラウザの設定をご確認ください。'); return; }
}

// 基材換算：各行 加工数÷取数。2〜10行目=切り上げ、1行目・補填(11行目)=切り捨て。取数0/空は空欄。
const _kzNum = v => { const n = parseFloat(String(v==null?'':v).replace(/[^0-9.\-]/g,'')); return isFinite(n)?n:NaN; };
function calcKizaiKans(){
  const toru = _kzNum(document.getElementById('k2-toru')?.textContent);
  let sum = 0;
  document.querySelectorAll('#k2-daily-body tr, #k2-hoten-body tr').forEach(tr => {
    const cell = tr.cells[tr.cells.length - 1];           // 基材換算＝各行の最終マス
    if(!cell) return;
    const kin = tr.querySelector('input[data-col="4"]');  // 加工数（補填行は補填数）
    const ri  = parseInt(kin?.dataset.row ?? '-1', 10);
    const kakou = _kzNum(kin?.value);
    let out = '';
    if(isFinite(kakou) && kakou > 0 && isFinite(toru) && toru > 0){
      const v = kakou / toru;
      const floor = (ri === 0 || ri === 10);              // 1行目・補填(11行目)は切り捨て、他は切り上げ
      out = floor ? Math.floor(v) : Math.ceil(v);
      sum += out;
    }
    cell.textContent = out;
  });
  const se = document.getElementById('k2-kizai-s');
  if(se) se.textContent = sum || '—';
}

function calcKrFuryou() {
  const keys = ['kizu','kubomi','imono','kake','meyani','peko','sonota'];
  const total = keys.reduce((s,k) => s + (parseInt(document.getElementById('f2-'+k)?.value||'0',10)||0), 0);
  const tel = document.getElementById('f2-total'); if(tel) tel.value = total || '';
  const sel = document.getElementById('k2-sei-s'); if(sel) sel.textContent = total || '';
}

function updateKrSummary() {
  let kakouSum = 0;
  document.querySelectorAll('#k2-daily-body tr').forEach(tr => {
    const ins = tr.querySelectorAll('input');
    kakouSum += parseInt(ins[4]?.value||'0',10)||0;
  });
  const ke = document.getElementById('k2-kakou-s'); if(ke) ke.textContent = kakouSum || '';
  calcKrFuryou();
  calcKizaiKans();
}

async function saveKiroku() {
  if(_kirokuIdx === null) return;
  const r = rows[_kirokuIdx];
  // 作業明細
  const daily = [];
  document.querySelectorAll('#k2-daily-body tr').forEach(tr => {
    const ins = tr.querySelectorAll('input');
    const sakugyobi = ins[0]?.value?.trim() || '';
    const kakou_su  = parseInt(ins[4]?.value||'0',10)||0;
    if(!sakugyobi && !kakou_su) return;
    daily.push({ sakugyobi, keisoku_lot: (ins[1]?.dataset.draft==='1') ? '' : (ins[1]?.value?.trim()||''),
      ondo: parseFloat(ins[2]?.value||'0')||0, keisoku: parseFloat(ins[3]?.value||'0')||0, kakou_su });
  });
  // 加工Lot
  const lots = [];
  for(let i = 0; i < KR_LOT_ROWS; i++) {
    const lot  = document.getElementById('k2-lot-'+i)?.value?.trim()||'';
    const hako = parseInt(document.getElementById('k2-hako-'+i)?.value||'0',10)||0;
    if(lot || hako) lots.push({lot, hako});
  }
  // 作業者4人
  const sakushas = [];
  for(let i = 0; i < 4; i++)
    sakushas.push(document.getElementById('k2-sakusha-'+i)?.value?.trim()||'');
  const iv = id => parseInt(document.getElementById(id)?.value||'0',10)||0;
  const sv = id => document.getElementById(id)?.value?.trim()||'';
  const record = {
    meisai_no: String(r.no), hinmei: r.nm, qty: r.qty, grp: r.grp||'',
    kakou_lot: lots[0]?.lot||'', hako_su: lots[0]?.hako||0, lots,
    nyuko_bi: sv('k2-nyuko-bi'), nyuko_su: iv('k2-nyuko-su'),
    kizai_furyou: iv('k2-kizai-f'), daily,
    furyou:{ kizu:iv('f2-kizu'), kubomi:iv('f2-kubomi'), imono:iv('f2-imono'),
             kake:iv('f2-kake'), meyani:iv('f2-meyani'), peko:iv('f2-peko'), sonota:iv('f2-sonota') },
    sakusha: sakushas[0]||'', sakushas,
    biko: sv('k2-biko'), kakoubi: sv('k2-kakoubi'), lot2: sv('k2-lot2'),
    hotensuu: iv('k2-hotensuu'), updated_at: new Date().toISOString(),
  };
  try {
    const resp = await fetch('http://localhost:'+KAKOU_PORT+'/', {
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(record)
    });
    if(resp.ok){ toast('加工記録を保存しました ✓'); closeKiroku(); }
    else toast('保存エラー: '+resp.status);
  } catch(e){ toast('保存エラー: '+e.message); }
}

function showParallelMenu(x,y,idx){

  menu.id='parallel-ctx-menu';
  const vw=window.innerWidth,vh=window.innerHeight;
  const left=x+160>vw?Math.max(0,vw-164):x;

  menu.style.left=left+'px';menu.style.top=top+'px';

  title.className='ctx-title';title.textContent='並行開始日を設定';
  menu.appendChild(title);
  days.forEach(([mmdd,dow])=>{
    const item=document.createElement('div');
    item.className='ctx-item'+(r.parallelFrom===mmdd?' ctx-active':'');
    item.textContent=mmdd+'('+dow+')';
    item.addEventListener('click',()=>{
      rows[idx].parallelFrom=mmdd;
      buildBody();markDirty();
      toast('並行開始: '+mmdd+' に設定');
      closeParallelMenu();
    });
    menu.appendChild(item);
  });

    const clr=document.createElement('div');clr.className='ctx-clear';clr.textContent='並行設定をクリア';

      buildBody();markDirty();
      toast('並行設定をクリア');
      closeParallelMenu();
    });
    menu.appendChild(clr);
  }
  document.body.appendChild(menu);_ctxMenu=menu;
  setTimeout(()=>document.addEventListener('click',closeParallelMenu,{once:true}),0);
}
function closeParallelMenu(){

// キーボードナビゲーション + Esc
document.addEventListener('keydown', function(e) {
  const modal = document.getElementById('kirokuModal');
  if(!modal?.classList.contains('on')) return;
  if(e.key === 'Escape'){ closeKiroku(); e.preventDefault(); return; }
  const el = e.target;
  const ri = parseInt(el.dataset?.row ?? '-1', 10);
  const ci = parseInt(el.dataset?.col ?? '-1', 10);
  if(ri < 0 || ci < 0) return;
  let nr = ri, nc = ci;
  if     (e.key === 'Enter'    || e.key === 'ArrowDown')                nr = Math.min(ri+1, KR_FIXED_ROWS-1);
  else if(e.key === 'ArrowUp')                                           nr = Math.max(ri-1, 0);
  else if((e.key === 'Tab' && !e.shiftKey) || e.key === 'ArrowRight') { nc = ci+1; if(nc > KR_MAX_COL){ nc=0; nr=Math.min(ri+1,KR_FIXED_ROWS-1); } }
  else if((e.key === 'Tab' &&  e.shiftKey) || e.key === 'ArrowLeft')  { nc = ci-1; if(nc < 0){ nc=KR_MAX_COL; nr=Math.max(ri-1,0); } }
  else return;
  e.preventDefault();
  function _goCell(nr, nc, dir) {
    for(let i = 0; i <= KR_MAX_COL; i++) {
      const t = document.querySelector('#k2-daily-body input[data-row="'+nr+'"][data-col="'+nc+'"]');
      if(t){ t.focus(); t.select(); return; }
      nc += dir;
      if(nc < 0 || nc > KR_MAX_COL) return;
    }
  }
  const isRight = (e.key==='Enter'||e.key==='ArrowDown') ? false
    : ((e.key==='Tab'&&!e.shiftKey)||e.key==='ArrowRight') ? true : false;
  _goCell(nr, nc, isRight ? 1 : -1);
});
// 加工記録ページの③入庫数と進捗(done)を連動させる
async function syncDoneFromKakou(rebuild=true){
  try{
    const resp = await fetch('http://localhost:'+KAKOU_PORT+'/', {cache:'no-store'});
    if(!resp.ok) return;
    const all = await resp.json();
    let changed = false;
    all.forEach(rec=>{
      if(rec?.nyuko_su == null) return;
      const idx = rows.findIndex(r=>String(r.no)===String(rec.meisai_no));
      if(idx < 0) return;
      let n = parseInt(rec.nyuko_su, 10);
      if(isNaN(n) || n < 0) n = 0;
      if(n > rows[idx].qty) n = rows[idx].qty;
      if(rows[idx].done !== n){ rows[idx].done = n; changed = true; }
    });
    if(changed && rebuild && !activeCell) buildBody();
  }catch(e){ /* 加工記録サーバー未起動時などは静かにスキップ */ }
}

<script>
// ── ガントエリア ドラッグスクロール ──
(function(){
  const wrap = document.querySelector('.wrap');
  if(!wrap) return;
  let active=false, moved=false, startX, startY, scrollLeft, scrollTop;
  wrap.addEventListener('pointerdown', e=>{
    if(e.target.closest('[data-grip],.fld,.dchip,button,input,select,textarea')) return;
    if(!e.target.closest('td.cell')) return;
    active=true; moved=false;
    startX=e.clientX; startY=e.clientY;
    scrollLeft=wrap.scrollLeft; scrollTop=wrap.scrollTop;
    wrap.setPointerCapture(e.pointerId);
  });
  wrap.addEventListener('pointermove', e=>{
    if(!active) return;
    const dx=e.clientX-startX, dy=e.clientY-startY;
    if(!moved && Math.abs(dx)<5 && Math.abs(dy)<5) return;
    moved=true;
    wrap.style.cursor='grabbing';
    wrap.scrollLeft=scrollLeft-dx;
    wrap.scrollTop =scrollTop -dy;
  });
  const stop=()=>{ if(!active)return; active=false; wrap.style.cursor=''; };
  wrap.addEventListener('pointerup',   stop);
  wrap.addEventListener('pointercancel',stop);
})();
</script>
