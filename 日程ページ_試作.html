<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日程ページ 試作 — 切断加工日程表</title>
<style>
/*__NITTEI_CSS__*/
</style>
</head>
<body class="hide-kss hide-denno">
<header>
  <h1 id="page-title">6月度 切断加工日程表</h1>
  <span class="sub" id="deliv-warn" style="display:none;color:var(--due);font-weight:700;font-size:16px;animation:deliv-blink 1.6s ease-in-out infinite;"></span>
  <span class="sub" id="samedaywork-warn" style="display:none;color:#f0c040;font-weight:700;font-size:16px;animation:deliv-blink 1.6s ease-in-out infinite;"></span>
  <div class="btns">
    <button id="sort-due-btn" onclick="sortPicksByDue()" style="display:none;background:#2e9e5b;color:#fff;border-color:#2e9e5b;">⇅ 期限でソート</button>
    <span id="eff-compact" class="eff-compact">週間効率：0％　月間効率：0％</span>
<button class="primary" id="save-btn" onclick="saveRows()" style="background:#b86040;color:#fff;border-color:#b86040;">保存</button>
  </div>
</header>
<div class="legend">
  <span class="sim-area">
    <button id="detail-toggle-btn" onclick="toggleDetail()" title="支給・消費・残数・伝票No列の表示切替">詳細 ▶</button>
  </span>
  <span><i style="background:var(--proc2)"></i>工程（二人・灯具以外）</span>
  <span><i style="background:var(--proc1)"></i>工程（一人・灯具）</span>
  <span><i style="background:var(--mat)"></i>材料支給</span>
  <span><i style="background:var(--deliv)"></i>納品</span>
  <span><i style="background:var(--due)"></i>期限</span>
  <span class="sim-area">
    <label class="sim-sw"><input type="checkbox" id="sim4-chk" onchange="onSim4Change(this.checked)"><span class="sim-track"><span class="sim-thumb"></span></span><span class="sim-lbl">+4h</span></label>
    <label class="sim-sw"><input type="checkbox" id="sim8-chk" onchange="onSim8Change(this.checked)"><span class="sim-track"><span class="sim-thumb"></span></span><span class="sim-lbl">+8h(1日)</span></label>
  </span>
  <span class="wk-btns" id="wk-btns">
    <span class="wk-note">網戸2回納品</span>
    <button class="wk-btn" data-wk="月" onclick="toggleWeekdayHl('月')">月</button>
    <button class="wk-btn" data-wk="火" onclick="toggleWeekdayHl('火')">火</button>
    <button class="wk-btn" data-wk="水" onclick="toggleWeekdayHl('水')">水</button>
    <button class="wk-btn" data-wk="木" onclick="toggleWeekdayHl('木')">木</button>
    <button class="wk-btn" data-wk="金" onclick="toggleWeekdayHl('金')">金</button>
  </span>
  <button id="reminder-btn" onclick="openReminderModal()" style="background:#3a2a5a;color:#c0a0e8;border-color:#5a3a8c;border-width:1px;border-style:solid;border-radius:6px;padding:6px 14px;font-size:13px;cursor:pointer;font-weight:600;" title="リマインダーを入力・確認">リマインダー</button>
  <button id="holiday-btn" onclick="openHolidayModal()" style="background:#2a3a5a;color:#a0c0e8;border-color:#3a5a8c;border-width:1px;border-style:solid;border-radius:6px;padding:6px 14px;font-size:13px;cursor:pointer;font-weight:600;" title="休日を選択して日程表のデイラインから除外">休日設定</button>
</div>
<div class="wrap">
  <div id="corner-front"></div>
  <table class="gantt">
    <thead><tr class="r1" id="head1"></tr><tr class="r2" id="head2"></tr></thead>
    <tbody id="body"></tbody>
  </table>
</div>
</div>
<div class="confirm-modal" id="confirmModal">
  <div class="confirm-pad">
    <div class="ctitle"><span id="ctitleText">タスクを削除しますか？</span></div>
    <div class="citem" id="confirmItem"></div>
    <div class="confirm-btns">
      <button class="confirm-yes" onclick="confirmDelete()">はい</button>
      <button class="confirm-no" onclick="closeConfirm()">いいえ</button>
    </div>
  </div>
</div>
<div class="holiday-modal" id="holidayModal">
  <div class="holiday-pad">
    <div class="holiday-head">
      <button onclick="shiftHolidayYear(-1)">◀</button>
      <span id="holidayYearLabel"></span>
      <button onclick="shiftHolidayYear(1)">▶</button>
      <button class="holiday-close" onclick="closeHolidayModal()">✕ 閉じる</button>
    </div>
    <div class="holiday-grid" id="holidayGrid"></div>
    <div class="holiday-foot">
      <span id="holidayStatus"></span>
      <button class="primary" onclick="applyHolidayReload()">更新して日程表に反映</button>
    </div>
  </div>
</div>
<div class="reminder-modal" id="reminderModal">
  <div class="reminder-pad">
    <div class="reminder-head">
      <span>リマインダー</span>
      <button class="reminder-close" onclick="closeReminderModal()">✕ 閉じる</button>
    </div>
    <div class="reminder-form">
      <input type="date" id="remDateInput">
      <input type="time" id="remTimeInput">
      <input type="text" id="remTextInput" placeholder="内容">
      <button class="primary" onclick="addReminder()">追加</button>
    </div>
    <div id="reminderList"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
/*__NITTEI_JS__*/
</script>

<!-- 加工記録モーダル v2（別窓方式へ移行済み・抜け殻を空要素として閉じる） -->
<div id="kirokuModal" class="kiroku-overlay"></div>

</body>
</html>
