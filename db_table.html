<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; display: flex; flex-direction: column; }
body { background: #1c1c1c; color: #e8e8e8; font-family: "Meiryo", "Segoe UI", sans-serif; font-size: 13px; }
.wrap { flex: 1; overflow: auto; min-height: 0; }
table { border-collapse: collapse; table-layout: auto; width: 100%; }
thead th {
  position: sticky; top: 0; z-index: 2;
  background: #1a1a1a; color: #aaa; font-weight: 600; font-size: 12px;
  padding: 5px 8px; border-bottom: 2px solid #444; border-right: 1px solid #333;
  white-space: nowrap; cursor: default;
}
thead th.col-hl { background: rgba(255,140,40,0.22) !important; }
tbody tr { border-bottom: 1px solid #2a2a2a; }
tbody tr:hover td { background: rgba(255,140,40,0.10) !important; }
tbody td {
  padding: 4px 8px; border-right: 1px solid #2a2a2a;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 180px; vertical-align: middle;
}
tbody td.col-hl { background: rgba(255,140,40,0.10); }
tbody tr:hover td.col-hl { background: rgba(255,140,40,0.22) !important; }
tbody tr:nth-child(even) td { background: #202020; }
tbody tr:nth-child(even) td.col-hl { background: rgba(255,140,40,0.13); }
tbody td:focus {
  outline: 2px solid #4a9eff; background: #1a2a3a !important;
  overflow: visible; white-space: normal; min-width: 60px;
}
:root { --accent:#d97757; --accent-hi:#e89070; }
::-webkit-scrollbar              { width:17px; height:17px; }
::-webkit-scrollbar-track        { background:#1C1C1C; }
::-webkit-scrollbar-thumb        { background:var(--accent); border-radius:6px; border:2px solid #1C1C1C; }
::-webkit-scrollbar-thumb:hover  { background:var(--accent-hi); }
::-webkit-scrollbar-corner       { background:#1C1C1C; }
html,body,.wrap{scrollbar-width:auto;scrollbar-color:var(--accent) #1C1C1C;}

.db-toolbar {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px; background: #161616;
  border-bottom: 2px solid #2a2a2a; flex-shrink: 0;
}
.db-toolbar-btn {
  background: #2a2a2a; border: 1px solid #3a3a3a; color: #d97757;
  font-size: 13px; font-weight: 600; cursor: pointer;
  padding: 5px 14px; border-radius: 5px; white-space: nowrap;
  font-family: "Meiryo","Segoe UI",sans-serif;
  transition: background 0.15s, color 0.15s;
}
.db-toolbar-btn:hover { background: #d97757; color: #1c1c1c; border-color: #d97757; }
.db-toolbar-title { font-size: 13px; color: #888; flex: 1; }

/* 変更セル */
tbody td.db-changed {
  background: #1e1e2e !important;
  outline: 1px solid #5a5aaa !important;
  color: #a8aae8 !important;
}
/* 保存バー */
#db-save-bar {
  display: none; position: sticky; bottom: 0; z-index: 10;
  background: #161622; border-top: 2px solid #4a4a8a;
  padding: 7px 14px; align-items: center; gap: 10px;
  font-size: 13px; font-family: "Meiryo","Segoe UI",sans-serif;
}
#db-change-count { color: #a8aae8; font-weight: 700; flex: 1; }
.db-action-btn {
  border: 1px solid; border-radius: 5px; padding: 5px 16px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  font-family: "Meiryo","Segoe UI",sans-serif; white-space: nowrap;
}
#db-save-btn  { background: #1a2a1a; border-color: #4a8a4a; color: #7dd87d; }
#db-save-btn:hover  { background: #2a4a2a; }
#db-save-btn:disabled { opacity: 0.5; cursor: not-allowed; }
#db-revert-btn { background: #2a1a1a; border-color: #8a4a4a; color: #d87d7d; }
#db-revert-btn:hover { background: #4a2a2a; }
/* トースト */
#db-toast {
  position: fixed; bottom: 54px; right: 18px; z-index: 999;
  border: 1px solid; border-radius: 8px; padding: 9px 18px;
  font-size: 13px; font-family: "Meiryo","Segoe UI",sans-serif;
  font-weight: 600; opacity: 0; transform: translateY(6px);
  transition: opacity 0.3s, transform 0.3s; pointer-events: none;
}
</style>
</head>

// ── 変更トラッキング ──
// key: "ri,ci"  value: {orig, current}
const CHANGES = new Map();

function markChanged(td, ri, ci, origVal) {
  const cur = td.textContent;
  const key = ri + ',' + ci;
  if (cur === origVal) {
    CHANGES.delete(key);
    td.classList.remove('db-changed');
  } else {
    CHANGES.set(key, { ri, ci, value: cur });
    td.classList.add('db-changed');
  }
  updateSaveBar();
}

function updateSaveBar() {
  const n = CHANGES.size;
  const bar   = document.getElementById('db-save-bar');
  const count = document.getElementById('db-change-count');
  bar.style.display = n > 0 ? 'flex' : 'none';
  count.textContent = n + ' 件の変更';
}

// ── 保存 ──
async function saveChanges() {
  const changes = [...CHANGES.values()];
  const saveBtn = document.getElementById('db-save-btn');
  saveBtn.disabled = true;
  saveBtn.textContent = '保存中…';
  try {
    const res = await fetch('http://localhost:8513/save_db', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ changes })
    });
    const j = await res.json();
    if (j.ok) {
      CHANGES.clear();
      document.querySelectorAll('.db-changed').forEach(td => td.classList.remove('db-changed'));
      updateSaveBar();
      showToast('✅ ' + j.saved + ' 件を保存しました');
    } else {
      showToast('❌ 保存失敗: ' + (j.msg || '不明なエラー'), true);
    }
  } catch(e) {
    showToast('❌ サーバーエラー: ' + e.message, true);
  } finally {
    saveBtn.disabled = false;
    saveBtn.textContent = '💾 保存';
  }
}

// ── 元に戻す ──
function revertAll() {
  if (!CHANGES.size) return;
  if (!confirm(CHANGES.size + ' 件の変更を全て元に戻しますか？')) return;
  CHANGES.forEach(({ri, ci}, key) => {
    const td = document.querySelector(`[data-ri="${ri}"][data-ci="${ci}"]`);
    if (td) {
      td.textContent = R[ri][ci];
      td.classList.remove('db-changed');
    }
  });
  CHANGES.clear();
  updateSaveBar();
}

// ── トースト通知 ──
function showToast(msg, isErr = false) {
  const t = document.getElementById('db-toast');
  t.textContent = msg;
  t.style.background = isErr ? '#4a1a1a' : '#1a3a2a';
  t.style.borderColor = isErr ? '#e06060' : '#4aaa6a';
  t.style.color       = isErr ? '#f08080' : '#6dd88d';
  t.style.opacity = '1';
  t.style.transform = 'translateY(0)';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => {
    t.style.opacity = '0';
    t.style.transform = 'translateY(6px)';
  }, 3000);
}

// ── テーブル構築 ──
const wrap = document.querySelector('.wrap');
const t = document.getElementById("t");
const thead = t.createTHead(), hr = thead.insertRow();
C.forEach((c, i) => {
  const th = document.createElement("th");
  th.textContent = c;
  th.onmouseenter = () => hl(i);
  th.onmouseleave = () => hl(-1);
  hr.appendChild(th);
});
const tb = t.createTBody();
R.forEach((row, ri) => {
  const tr = tb.insertRow();
  row.forEach((v, ci) => {
    const td = tr.insertCell();
    td.textContent = v;
    td.title = v;
    td.contentEditable = "true";
    td.dataset.ri = ri;
    td.dataset.ci = ci;
    td.onmouseenter = () => hl(ci);
    td.onmouseleave = () => hl(-1);
    // 変更検知
    td.addEventListener('input', () => markChanged(td, ri, ci, String(R[ri][ci])));
    // Enterキーで確定
    td.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); td.blur(); }
      if (e.key === 'Escape') {
        td.textContent = R[ri][ci];
        td.classList.remove('db-changed');
        CHANGES.delete(ri + ',' + ci);
        updateSaveBar();
        td.blur();
      }
    });
  });
});

function hl(ci) {
  [...hr.cells].forEach((th, i) => th.classList.toggle("col-hl", i === ci));
  [...tb.rows].forEach(tr => [...tr.cells].forEach((td, i) => td.classList.toggle("col-hl", i === ci)));
}
</script>

<div id="db-save-bar">
  <span id="db-change-count"></span>
  <button class="db-action-btn" id="db-save-btn" onclick="saveChanges()">💾 保存</button>
  <button class="db-action-btn" id="db-revert-btn" onclick="revertAll()">↩ 元に戻す</button>
</div>
<div id="db-toast"></div>
</body>
</html>
